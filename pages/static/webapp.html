<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>Discross</title>
        <meta
            name="description"
            content="Discross is a universal Discord client designed to work on any device with a basic HTML web browser. Access Discord on everything from retro consoles to modern smartphones."
        />
        <meta
            name="keywords"
            content="Discord,client,wii,nintendo switch,switch,retro,consoles,browser,html"
        />

        <!-- Social Media & Embedding (Open Graph) -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Discross" />
        <meta
            property="og:description"
            content="Discross is a universal Discord client designed to work on any device with a basic HTML web browser. Access Discord on everything from retro consoles to modern smartphones."
        />
        <meta property="og:image" content="/android-chrome-256x256.png" />
        <meta property="og:url" content="https://discross.net/" />
        <meta property="og:site_name" content="Discross" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Discross" />
        <meta
            name="twitter:description"
            content="Discross is a universal Discord client designed to work on any device with a basic HTML web browser. Access Discord on everything from retro consoles to modern smartphones."
        />
        <meta name="twitter:image" content="/android-chrome-256x256.png" />

        <!-- Mobile & Legacy Compatibility -->
        <meta name="HandheldFriendly" content="true" />
        <meta name="MobileOptimized" content="320" />
        <meta name="format-detection" content="telephone=no" />

        <!-- iOS & Apple -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="Discross" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

        <!-- Windows & Microsoft -->
        <meta name="msapplication-TileColor" content="#2b5797" />
        <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
        <meta name="theme-color" content="#ffffff" />
        <script>
            (function (a, b, c) {
                if (c in b && b[c]) {
                    var d,
                        e = a.location,
                        f = /^(a|html)$/i;
                    a.addEventListener(
                        'click',
                        function (a) {
                            d = a.target;
                            while (!f.test(d.nodeName)) d = d.parentNode;
                            'href' in d &&
                                (d.href.indexOf('http') || ~d.href.indexOf(e.host)) &&
                                (a.preventDefault(), (e.href = d.href));
                        },
                        !1
                    );
                }
            })(document, window.navigator, 'standalone');
        </script>
        <style>
            html,
            body {
                margin: 0;
                width: 100%;
                height: 100%;
            }

            iframe {
                border: none;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>

    <body bgcolor="#303338" style="margin: 0">
        <iframe src="index.html"></iframe>
    </body>
</html>
