<!DOCTYPE html>
<html class="page-simple">

<head>
  {$COMMON_HEAD}
  <title>Discross - Currency</title>
</head>

<body style="margin: 0;" {$WHITE_THEME_ENABLED}>
  <div id="wrapper">
    <table style="width: 100%;">
      <tr valign="middle">
        <td><a href="/server/"><img src="/resources/logo.gif" alt="Logo"></a></td>
        <td>
          <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
        </td>
        <td width="100%" align="right">
          <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160; {$MENU_OPTIONS}</font>
        </td>
        <td valign="middle">
          <a href="/switchtheme{$SESSION_SUFFIX}"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none;"></a>
        </td>
      </tr>
    </table>
    <hr style="margin: 4px 0;">
    <br>
    <table>
      <tr>
        <td>
          &nbsp;&nbsp;&nbsp;&nbsp;
        </td>
        <td>
          <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
            <font size="5">Currency</font>
            <br><br>
            <form method="GET" action="/currency">
              <input type="hidden" name="sessionID" value="{$SESSION_ID}">
              <table cellpadding="0" cellspacing="4">
                <tr>
                  <td>
                    <div style="padding: 8px 12px; background: #222327; display: inline-block;">
                      <input type="text" name="base" value="{$BASE_VALUE}" placeholder="Base currency (e.g. USD)"
                        style="color: #dddddd; background: #222327; border: none; width: 220px; outline: none; font-family: 'rodin', Arial, Helvetica, sans-serif; font-size: 15px; text-transform: uppercase;" maxlength="3">
                    </div>
                  </td>
                  <td style="padding-left: 8px;">
                    <button type="submit" class="discross-button" style="padding: 8px 18px; margin: 0; font-size: 15px;">View</button>
                  </td>
                </tr>
              </table>
            </form>
            <br>
            {$CURRENCY_CONTENT}
            <br><br>
            <font size="2" color="#72767d">Currency data courtesy of <a href="https://www.frankfurter.app/" style="color: #5865f2;">Frankfurter</a> (European Central Bank)</font>
          </font>
        </td>
      </tr>
    </table>
  </div>
</body>

</html>
