<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    {$COMMON_HEAD}
    <style type="text/css">
        BODY {
            color: #fff;
            background: #111;
            font-size: 8px;
            font-family: sans-serif;
            margin: 0px;
            padding: 0px;
            overflow-x: hidden;
            width: 320px;
            position: relative;
        }
        FORM {
            margin: 0px;
            padding: 0px;
        }
        INPUT, BUTTON {
            position: absolute;
            border: 1px outset #888;
            font-family: sans-serif;
            box-sizing: border-box;
            color: #000;
        }
        .button {
            background: #00f;
            border: 1px outset #00f;
            color: #fff;
            font-size: 8px;
            height: 15px;
            text-align: center;
            width: 38px;
            cursor: pointer;
            padding: 0;
        }
        .layer-btn {
            background: #fff;
            left: 244px;
            width: 34px;
            height: 19px;
            font-size: 8px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            text-align: center;
        }
        .brush-btn {
            background: #fff;
            left: 244px;
            width: 34px;
            height: 13px;
            font-size: 8px;
            cursor: pointer;
            padding: 0;
            text-align: center;
        }
        .c-box {
            position: absolute;
            width: 19px;
            height: 15px;
            border: 1px outset #888;
            cursor: pointer;
            box-sizing: border-box;
        }
        DIV {
            position: absolute;
        }
        CANVAS.paint-canvas {
            border: 1px inset #888;
            left: 0px;
            position: absolute;
            top: 0px;
        }
        .toolbelt-container, .toolbelt-container DIV {
            position: relative !important;
        }
    </style>
</head>
<body {$WHITE_THEME_ENABLED}>
    <div style="width: 320px; height: 240px; position: relative; overflow: hidden;">
    <form action="/senddrawing" method="post" id="sendform" onsubmit="return false;">
        <!-- Standard 16 Color Palette Toolbar -->
        <div id="c1" class="c-box" style="left: 280px; top: 0px; background:#000000;" onclick="return setColor('#000000', 'c1');"></div>
        <div id="c2" class="c-box" style="left: 300px; top: 0px; background:#555555;" onclick="return setColor('#555555', 'c2');"></div>
        <div id="c3" class="c-box" style="left: 280px; top: 15px; background:#aaaaaa;" onclick="return setColor('#aaaaaa', 'c3');"></div>
        <div id="c4" class="c-box" style="left: 300px; top: 15px; background:#ffffff;" onclick="return setColor('#ffffff', 'c4');"></div>
        <div id="c5" class="c-box" style="left: 280px; top: 30px; background:#800000;" onclick="return setColor('#800000', 'c5');"></div>
        <div id="c6" class="c-box" style="left: 300px; top: 30px; background:#ff0000;" onclick="return setColor('#ff0000', 'c6');"></div>
        <div id="c7" class="c-box" style="left: 280px; top: 45px; background:#ff9900;" onclick="return setColor('#ff9900', 'c7');"></div>
        <div id="c8" class="c-box" style="left: 300px; top: 45px; background:#ffff00;" onclick="return setColor('#ffff00', 'c8');"></div>
        <div id="c9" class="c-box" style="left: 280px; top: 60px; background:#800080;" onclick="return setColor('#800080', 'c9');"></div>
        <div id="c10" class="c-box" style="left: 300px; top: 60px; background:#004d00;" onclick="return setColor('#004d00', 'c10');"></div>
        <div id="c11" class="c-box" style="left: 280px; top: 75px; background:#00ff00;" onclick="return setColor('#00ff00', 'c11');"></div>
        <div id="c12" class="c-box" style="left: 300px; top: 75px; background:#000080;" onclick="return setColor('#000080', 'c12');"></div>
        <div id="c13" class="c-box" style="left: 280px; top: 90px; background:#00ffff;" onclick="return setColor('#00ffff', 'c13');"></div>
        <div id="c14" class="c-box" style="left: 300px; top: 90px; background:#ff69b4;" onclick="return setColor('#ff69b4', 'c14');"></div>
        <div id="c15" class="c-box" style="left: 280px; top: 105px; background:#ff00ff;" onclick="return setColor('#ff00ff', 'c15');"></div>
        <div id="c16" class="c-box" style="left: 300px; top: 105px; background:#8b4513;" onclick="return setColor('#8b4513', 'c16');"></div>

        <!-- Eyedropper & Color Display -->
        <input type="button" id="i_dropper" style="background: #fff; left: 280px; top: 124px; width: 19px; height: 18px; font-size: 8px; padding: 0;" onclick="return set_dropper();" value="Drp" title="Eyedropper" />
        <input type="button" id="b_color" style="background: rgb(0,0,0); left: 300px; top: 124px; width: 19px; height: 18px; border: 1px inset #888;" disabled="disabled" />

        <!-- Layer Selection Buttons -->
        <input type="button" id="btn_layer_4" class="layer-btn" style="top: 0px;" onclick="return set_layer(4);" value="L4 (Top)" />
        <input type="button" id="btn_layer_3" class="layer-btn" style="top: 21px;" onclick="return set_layer(3);" value="L3" />
        <input type="button" id="btn_layer_2" class="layer-btn" style="background: #ff0; top: 42px;" onclick="return set_layer(2);" value="L2" />
        <input type="button" id="btn_layer_1" class="layer-btn" style="top: 63px;" onclick="return set_layer(1);" value="L1" />
        <input type="button" id="btn_layer_0" class="layer-btn" style="top: 84px;" onclick="return set_layer(0);" value="L0 (Bg)" />

        <!-- Eraser & Clear Buttons -->
        <input type="button" id="b_erase" style="left: 244px; top: 106px; width: 16px; height: 19px; font-size: 8px; background: #fff; padding: 0;" onclick="return toggle_erase();" value="Ers" title="Toggle Eraser" />
        <input type="button" id="b_clear" style="left: 262px; top: 106px; width: 16px; height: 19px; font-size: 8px; background: #fff; padding: 0;" onclick="return clear_layer();" value="Clr" title="Clear Layer" />

        <!-- Brush Size Buttons -->
        <input type="button" id="btn_brush_2" class="brush-btn" style="top: 128px;" onclick="return set_brush(2);" value="2px" />
        <input type="button" id="btn_brush_4" class="brush-btn" style="top: 142px;" onclick="return set_brush(4);" value="4px" />
        <input type="button" id="btn_brush_6" class="brush-btn" style="background: #ff0; top: 156px;" onclick="return set_brush(6);" value="6px" />
        <input type="button" id="btn_brush_8" class="brush-btn" style="top: 170px;" onclick="return set_brush(8);" value="8px" />
        <input type="button" id="btn_brush_10" class="brush-btn" style="top: 184px;" onclick="return set_brush(10);" value="10px" />

        <!-- Action Buttons -->
        <input type="submit" class="button" style="left: 280px; top: 146px; width: 39px; height: 16px; background: #00f;" id="b_save" onclick="return save();" value="Send" />
        <input type="button" class="button" style="left: 280px; top: 165px; width: 39px; height: 16px; background: #444;" value="Back" onclick="location.href='/channels/{$CHANNEL_ID}{$SESSION_PARAM}';" />
        <input type="button" class="button" style="left: 280px; top: 184px; width: 39px; height: 16px; background: #282; font-size: 7px;" value="Mode" title="Switch to Standard Mode" onclick="location.href='/draw/{$CHANNEL_ID}{$MODE_TOGGLE_URL}';" />

        <!-- Form Hidden Data -->
        <input type="hidden" id="channel" name="channel" value="{$CHANNEL_ID}" />
        <input type="hidden" name="sessionID" value="{$SESSION_ID}" />
        <input type="hidden" id="drawinginput" name="drawinginput" value="" />
        <input type="hidden" id="lite" name="lite" value="True" />

        <!-- Optional Message Input -->
        <input type="text" name="message" id="message" placeholder="Message {$CHANNEL_NAME} (optional)..." style="left: 2px; top: 218px; width: 236px; height: 18px; border: 1px inset #888; background: #fff; color: #000; font-size: 9px; padding: 2px;" />
    </form>

    <!-- 5 Canvas Layers -->
    <canvas id="canvas0" class="paint-canvas" style="background: #fff;" width="240" height="200"></canvas>
    <canvas id="canvas1" class="paint-canvas" width="240" height="200"></canvas>
    <canvas id="canvas2" class="paint-canvas" width="240" height="200"></canvas>
    <canvas id="canvas3" class="paint-canvas" width="240" height="200"></canvas>
    <canvas id="canvas4" class="paint-canvas" width="240" height="200"></canvas>

    <div style="height: 14px; left: 2px; top: 202px; width: 236px; color: #fff; font-size: 9px; overflow: hidden;" id="status">3DS Paint (DSiPaint Engine)...</div>
    </div>

    <!-- Discross Toolbelt & DSiPaint Attribution -->
    <div class="toolbelt-container" style="width: 320px; padding: 6px 4px; box-sizing: border-box; text-align: center; background: #18181b;">
        <div style="margin-bottom: 6px;">
            <a href="/upload/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f4e4.gif" alt="Upload" width="20" height="20" /></a>
            <a href="/draw/{$CHANNEL_ID}{$MODE_TOGGLE_URL}" class="message-action-btn" title="Switch Mode"><img src="/resources/twemoji/1f58c-fe0f.gif" alt="Mode" width="20" height="20" /></a>
            <a href="/pins/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f4cc.gif" alt="Pins" width="20" height="20" /></a>
            <a href="/sports{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/26bd.gif" alt="Sports" width="20" height="20" /></a>
            <a href="/food/{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f355.gif" alt="Pizza" width="20" height="20" /></a>
            <a href="/news{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f4f0.gif" alt="News" width="20" height="20" /></a>
            <a href="/weather{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/26c5.gif" alt="Weather" width="20" height="20" /></a>
            <a href="/stocks{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f4c8.gif" alt="Stocks" width="20" height="20" /></a>
            <a href="/currency{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f4b5.gif" alt="Currency" width="20" height="20" /></a>
            <a href="/tv{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f4fa.gif" alt="TV Guide" width="20" height="20" /></a>
            <a href="/movies{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f3ac.gif" alt="Movies" width="20" height="20" /></a>
            <a href="/switchtheme{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/1f313.gif" alt="Theme" width="20" height="20" /></a>
            <a href="/channels/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn"><img src="/resources/twemoji/2b05.gif" alt="Back" width="20" height="20" /></a>
            <a href="javascript:void(0)" onclick="location.reload()" class="message-action-btn"><img src="/resources/twemoji/1f501.gif" alt="Refresh" width="20" height="20" /></a>
        </div>
        <div style="color: #aaaaaa; font-size: 9px; margin-top: 4px;">
            Legacy 3DS drawing app engine credited to <b>DSiPaint</b> (HullBreach).
        </div>
    </div>

    <script src="/js/draw-3ds.js"></script>
</body>
</html>
