<!doctype html>
<html lang="en" class="page-simple">
  <head>
    {$COMMON_HEAD}
    <title>Discross - Login</title>
  </head>

  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
      <table style="width: 100%">
        <tr valign="middle">
          <td>
            <a href="/"><img src="/resources/logo.gif" alt="Logo" /></a>
          </td>
          <td>
            <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
          </td>
          <td width="100%" align="right">
            <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">{$MENU_OPTIONS}</font>
          </td>
          <td valign="middle" style="padding-right: 8px;">
            <a href="/switchtheme"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none" /></a>
          </td>
        </tr>
      </table>
      <hr style="margin: 0" />
      <br />
      <table>
        <tr>
          <td>&nbsp;&nbsp;&nbsp;&nbsp;</td>
          <td>
            <form action="/login" method="post">
              <h1 style="font-size: 24px; font-weight: bold; font-family: 'rodin', Arial, Helvetica, sans-serif; color: #dddddd; margin: 0 0 8px 0;">Login</h1><br /><br />
              <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
                Username:
                <br /><br />
                <div style="padding: 16px; background: #222327; max-width: 300px; width: 100%"><input type="text" name="username" id="username" value="" style=" color: #dddddd; background: #222327; border: none; width: 100%; outline: none; " placeholder="Username" autocomplete="username webauthn" /></div>
                <br />
                Password:
                <br /><br />
                <div style="padding: 16px; background: #222327; max-width: 300px; width: 100%"><input type="password" name="password" id="password" value="" style=" color: #dddddd; background: #222327; border: none; width: 100%; outline: none; " placeholder="Password" /></div>
                <br />
                2FA Code: (leave blank if not set up)
                <br /><br />
                <div style="padding: 16px; background: #222327; max-width: 300px; width: 100%"><input type="text" name="totp_code" id="totp_code" value="" style=" color: #dddddd; background: #222327; border: none; width: 100%; outline: none; " placeholder="6-digit code or backup code" /></div>
                <br />
                <a href="#" id="passkey-login" style="text-decoration: none">
                  <font color="#5865f2" size="4" face="'rodin', Arial, Helvetica, sans-serif">Or sign in with passkey</font>
                </a>
                <br /><br />
                <a href="/forgot.html" style="text-decoration: none">
                  <font color="#999999" size="4" face="'rodin', Arial, Helvetica, sans-serif">Forgot username or password</font>
                </a>
                <br /><br />
                <input type="submit" style=" color: #ffffff; height: 44px; width: 150px; border: none; background: #5865f2; border-radius: 8px; font-family: 'rodin', Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; " value="Login" />
                </font>
                </form>
                </td>
                </tr>
                </table>
                </div>
                <script>
                (function() {
                    async function doPasskeyLogin(options, isConditional) {
                        try {
                            // Cast challenge and allowCredentials ids to window.Uint8Array
                            options.challenge = new window.Uint8Array(options.challenge);
                            if (options.allowCredentials) {
                                for (var i = 0; i < options.allowCredentials.length; i++) {
                                    options.allowCredentials[i].id = new window.Uint8Array(options.allowCredentials[i].id);
                                }
                            }

                            var getOptions = { publicKey: options };
                            if (isConditional) {
                                getOptions.mediation = 'conditional';
                            }

                            var assertion = await navigator.credentials.get(getOptions);
                            if (!assertion) return;

                            var data = {
                                id: assertion.id,
                                rawId: btoa(String.fromCharCode.apply(null, new window.Uint8Array(assertion.rawId))),
                                type: assertion.type,
                                response: {
                                    authenticatorData: btoa(String.fromCharCode.apply(null, new window.Uint8Array(assertion.response.authenticatorData))),
                                    clientDataJSON: btoa(String.fromCharCode.apply(null, new window.Uint8Array(assertion.response.clientDataJSON))),
                                    signature: btoa(String.fromCharCode.apply(null, new window.Uint8Array(assertion.response.signature)))
                                }
                            };

                            var verify = await fetch('/passkey/verify?type=login', {
                                method: 'POST',
                                body: JSON.stringify(data),
                                headers: { 'Content-Type': 'application/json' }
                            });

                            if (verify.ok) {
                                window.location.href = '/server/';
                            } else {
                                alert('Passkey login failed');
                            }
                        } catch (err) {
                            if (err.name !== 'NotAllowedError' && !isConditional) {
                                alert('Error: ' + err.message);
                            }
                        }
                    }

                    // Manual login
                    document.getElementById('passkey-login').onclick = async function(e) {
                        e.preventDefault();
                        var username = document.getElementById('username').value;
                        if (!username) { alert('Please enter your username'); return; }
                        
                        var res = await fetch('/passkey/options?type=login&username=' + encodeURIComponent(username));
                        var options = await res.json();
                        if (options.error) { alert('No passkey found for this user'); return; }
                        
                        doPasskeyLogin(options, false);
                    };

                    // Conditional UI (Autofill)
                    if (window.PublicKeyCredential && PublicKeyCredential.isConditionalMediationAvailable) {
                        PublicKeyCredential.isConditionalMediationAvailable().then(function(available) {
                            if (available) {
                                fetch('/passkey/options?type=login')
                                    .then(function(res) { return res.json(); })
                                    .then(function(options) {
                                        doPasskeyLogin(options, true);
                                    });
                            }
                        });
                    }
                })();
                </script>
                </body>
                </html>
