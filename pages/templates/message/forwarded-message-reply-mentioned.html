<table cellpadding="0" cellspacing="0" width="100%" class="ping-row" style="margin: 0 0 0 -12px; padding: 8px 0">
  <tr>
    <td style="padding-left: 8px">
      {$REPLY_INDICATOR}
      <table cellpadding="0" cellspacing="0" width="100%" class="message-header-table" style="margin-bottom: 4px">
        <tr>
          <td class="message-author-cell">
            <font onclick="document.getElementById('message').value += { $TAG }" style="font-weight:600;color:{$AUTHOR_COLOR};cursor:pointer;margin-right:8px" face="rodin,sans-serif">{$MESSAGE_AUTHOR}</font>
          </td>
          <td align="right" class="message-meta-cell" style="white-space: nowrap; text-align: right;">
            <font style="font-size: 12px; vertical-align: middle;" face="rodin,sans-serif" class="message-date-font">{$MESSAGE_DATE}</font>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td class="message-body-cell" style="padding-left: 8px">
      <img src="/resources/twemoji/27a1.gif" class="message-reply-emoji" style="vertical-align: middle; margin-right: 0px; width: 14px; height: 14px;" />
      <span class="forwarded-label" style="vertical-align: middle; font-size: 12px; font-family: rodin, sans-serif;">Forwarded</span>
      {$FORWARDED_CONTENT_BLOCK} {$FORWARDED_EMBEDS} {$FORWARDED_ORIGIN}
      {$MESSAGE_CONTENT}
    </td>
  </tr>
</table>
