<table
  cellpadding="0"
  cellspacing="0"
  width="100%"
  style="margin: 0; padding: 8px 0 8px 12px; border-left: 4px solid #4f545c"
>
  <tr>
    <td>
      {$REPLY_INDICATOR}
      <table cellpadding="0" cellspacing="0" style="margin-bottom: 4px">
        <tr>
          <td>
            <font
              onclick="document.getElementById('message').value += { $TAG }"
              style="font-weight:600;color:{$AUTHOR_COLOR};cursor:pointer;margin-right:8px"
              face="rodin,sans-serif"
              >{$MESSAGE_AUTHOR}</font
            >
          </td>
          <td>
            <font style="font-size: 12px" face="rodin,sans-serif" class="message-date-font"
              >{$MESSAGE_DATE}</font
            >
          </td>
        </tr>
      </table>
      <font
        class="forwarded-label"
        style="font-size: 12px; display: block; margin-bottom: 4px"
        face="rodin,sans-serif"
        >→ Forwarded</font
      >
      {$FORWARDED_CONTENT_BLOCK} {$FORWARDED_EMBEDS} {$FORWARDED_ORIGIN}
      <font
        style="font-size: 14px; line-height: 18px; word-wrap: break-word"
        face="rodin,sans-serif"
        class="messagecontent"
        >{$MESSAGE_CONTENT}</font
      >
    </td>
  </tr>
</table>
