<script>
  (function() {
    var ua = navigator.userAgent;
    var isDSi = ua.indexOf('Nintendo DSi') !== -1;
    if (ua.indexOf('Nintendo 3DS') !== -1 || isDSi) {
      var isNew3DS = ua.indexOf('New Nintendo 3DS') !== -1 || ua.indexOf('NintendoBrowser') !== -1;
      document.documentElement.className += isNew3DS ? ' client-new3ds' : ' client-3ds';
      // The DSi (Opera 9.5) shares the client-3ds message layout but needs a few
      // overrides where that layout relies on rendering the real 3DS does but
      // the DSi does not — tagged with client-dsi.
      if (isDSi) document.documentElement.className += ' client-dsi';
    }
  })();
</script>
