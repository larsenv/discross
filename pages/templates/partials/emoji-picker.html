<div id="emoji" style="{$EMOJI_DISPLAY}">
  <div id="emoji-quick-picker">
      {$EMOJI_QUICK_HTML}
  </div>
  <table cellpadding="0" cellspacing="0" width="100%">
    <tr>
      <td align="center" style="padding: 4px">
        <details id="emoji-details" {$EMOJI_OPEN} style="display: inline-block; width: 100%;">
          <summary style="display: block; list-style: none; text-align: center;">
            <a id="emoji-more-button" class="discross-button" style="padding: 8px 16px; cursor: pointer; display: inline-block; width: auto; margin: 0 auto; text-decoration: none;" href="{$EMOJI_EXPAND_URL}">More</a>
          </summary>
          
          <!-- Skin Tone Selector (only shows when expanded) -->
          <div style="padding: 8px 4px; text-align: center; background: #2f3136; border-radius: 0; border: 1px solid #202225; margin-top: 8px;">
            <div style="display: flex; justify-content: center; gap: 4px;">
              {$SKINTONE_SELECTOR_HTML}
            </div>
          </div>

          <div id="emoji-expanded" style="height: 350px; overflow-y: scroll; background: #36393f; border: 1px solid #202225; border-radius: 4px; padding: 8px; margin-top: 8px; text-align: left;">
            <div id="emoji-container">
               {$EMOJI_EXPANDED_HTML}
            </div>
          </div>
        </details>
      </td>
    </tr>
  </table>
</div>
<!-- Initialize server emojis if any -->
<script>
    window.SERVER_EMOJIS = {$SERVER_EMOJIS_JSON};
    window.EMOJI_SKIN_TONE = "{$SKIN_TONE}";
    if (typeof initEmojiPicker === 'function') initEmojiPicker();
</script>
<script src="/js/emojiList.js"></script>
<script src="/js/emojiPicker.js"></script>
