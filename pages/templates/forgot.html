<!DOCTYPE html>
<html class="page-simple">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#2b5797">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="/css/main.css">
</head>

<body style="margin: 0;" {$WHITE_THEME_ENABLED}>
  <div id="wrapper">
    <table style="width: 100%;">
      <tr valign="middle">
        <td><a href="/"><img src="/resources/logo.gif" alt="Logo"></a></td>
        <td>
          <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
        </td>
        <td width="100%" align="right">
          <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160; {$MENU_OPTIONS}</font>
        </td>
        <td valign="middle">
          <form action="/switchtheme" method="post">
            <input type="image" src="/resources/images/themeswitch.gif" alt="Switch theme" style="background: none; border: none;">
          </form>
        </td>
      </tr>
    </table>
    <hr style="margin: 0;">
    <br>
    <table>
        <tr>
          <td>
            &nbsp;&nbsp;&nbsp;&nbsp;
          </td>
          <td>
            <form action="/forgot" method="post">
              <font size="6" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">Forgot username or password<br>
                WARNING:<br>
                This will delete your account so that you can create a new one.</font>
              <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
                <br><br>
                Verification code:
                <br><br>
                Type ^connect on a server with Discross to get this.
                <br><br>
                <div style="padding: 16px;background: #393c40;width: 300px;"><input type="text"
                    name="token" id="token" value=""
                    style="color: #dddddd;background: #393c40;border: none;width: 100%;outline: none;"
                    placeholder="Verification code"></div>
                {$ERROR}<br>
                <input type="submit"
                  style="color: #ffffff;height: 44px;width:150px;border: none;background: #5865f2;"
                  value="Delete account">
              </font>
            </form>
          </td>
        </tr>
    </table>
  </div>
</body>

</html>
