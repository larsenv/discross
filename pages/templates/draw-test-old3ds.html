<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    {$COMMON_HEAD}
    <style type="text/css">
        /* Old 3DS single-canvas harness.
           Same 320x240 pixel budget the retired DSiPaint-derived page used, but with
           ONE <canvas id="sketchpad"> driven by the shared draw.js engine instead of
           that page's 5 stacked layer canvases. The element IDs below (c1..c16,
           s1..s4, btn-draw/btn-fill/btn-eraser, sendform, drawinginput) are exactly
           the ones draw.js binds to, so draw.js runs here unmodified.

           This answered its question: the engine works on Old 3DS once the canvas is
           nudged into repainting, so draw-old3ds.html and draw-3ds.js were removed
           and draw.js now carries the nudge itself. Kept as the diagnostic rig for
           the next legacy-browser drawing bug — several comments below refer to
           draw-3ds.js, which lives on in git history. */
        BODY {
            color: #dcddde;
            background: #36393f;
            font-size: 8px;
            font-family: 'rodin', sans-serif;
            margin: 0px;
            padding: 0px;
            overflow-x: hidden;
            width: 320px;
        }
        FORM { margin: 0px; padding: 0px; }
        INPUT, BUTTON {
            position: absolute;
            border: 1px solid #202225;
            font-family: 'rodin', sans-serif;
            font-size: 8px;
            box-sizing: border-box;
            padding: 0;
            color: #000;
        }
        .tool-btn {
            background: #b9bbbe;
            height: 18px;
            width: 48px;
            cursor: pointer;
            text-align: center;
        }
        .size-btn {
            background: #b9bbbe;
            height: 16px;
            width: 30px;
            cursor: pointer;
            text-align: center;
        }
        .c-box {
            position: absolute;
            width: 32px;
            height: 17px;
            border: 2px solid #555555;
            cursor: pointer;
            box-sizing: border-box;
        }
        DIV { position: absolute; }
        /* draw.js measures #canvas-wrapper and only scales the canvas down when the
           wrapper's inner width is smaller than the backing buffer. 250px keeps the
           240px buffer at 1:1, so screen coordinates map straight through and any
           offset we see is a real browser quirk, not our own scale factor. */
        #canvas-wrapper {
            position: absolute;
            left: 0px;
            top: 0px;
            width: 250px;
            height: 142px;
            padding: 0px;
        }
        #sketchpad {
            border: 1px solid #202225;
            background: #ffffff;
            position: absolute;
            left: 0px;
            top: 0px;
        }
        #diag {
            left: 2px;
            top: 184px;
            width: 316px;
            height: 56px;
            overflow: hidden;
            color: #b9bbbe;
            font-size: 8px;
            line-height: 8px;
        }
    </style>
</head>
<body {$WHITE_THEME_ENABLED}>
    <div style="width: 320px; height: 240px; position: relative; overflow: hidden;">

    <div id="canvas-wrapper"><canvas id="sketchpad" width="600" height="350"></canvas></div>

    <!-- 16 color palette, stacked in the 68px strip to the right of the canvas -->
    <div id="c1"  class="c-box" style="left: 252px; top: 0px;   background:#000000;" onclick="setColor('#000000','c1');"></div>
    <div id="c2"  class="c-box" style="left: 285px; top: 0px;   background:#555555;" onclick="setColor('#555555','c2');"></div>
    <div id="c3"  class="c-box" style="left: 252px; top: 17px;  background:#aaaaaa;" onclick="setColor('#aaaaaa','c3');"></div>
    <div id="c4"  class="c-box" style="left: 285px; top: 17px;  background:#ffffff;" onclick="setColor('#ffffff','c4');"></div>
    <div id="c5"  class="c-box" style="left: 252px; top: 34px;  background:#800000;" onclick="setColor('#800000','c5');"></div>
    <div id="c6"  class="c-box" style="left: 285px; top: 34px;  background:#ff0000;" onclick="setColor('#ff0000','c6');"></div>
    <div id="c7"  class="c-box" style="left: 252px; top: 51px;  background:#ff9900;" onclick="setColor('#ff9900','c7');"></div>
    <div id="c8"  class="c-box" style="left: 285px; top: 51px;  background:#ffff00;" onclick="setColor('#ffff00','c8');"></div>
    <div id="c9"  class="c-box" style="left: 252px; top: 68px;  background:#800080;" onclick="setColor('#800080','c9');"></div>
    <div id="c10" class="c-box" style="left: 285px; top: 68px;  background:#004d00;" onclick="setColor('#004d00','c10');"></div>
    <div id="c11" class="c-box" style="left: 252px; top: 85px;  background:#00ff00;" onclick="setColor('#00ff00','c11');"></div>
    <div id="c12" class="c-box" style="left: 285px; top: 85px;  background:#000080;" onclick="setColor('#000080','c12');"></div>
    <div id="c13" class="c-box" style="left: 252px; top: 102px; background:#00ffff;" onclick="setColor('#00ffff','c13');"></div>
    <div id="c14" class="c-box" style="left: 285px; top: 102px; background:#ff69b4;" onclick="setColor('#ff69b4','c14');"></div>
    <div id="c15" class="c-box" style="left: 252px; top: 119px; background:#ff00ff;" onclick="setColor('#ff00ff','c15');"></div>
    <div id="c16" class="c-box" style="left: 285px; top: 119px; background:#8b4513;" onclick="setColor('#8b4513','c16');"></div>

    <form action="/drawtest" method="post" id="sendform" onsubmit="return false;">
        <input type="hidden" id="drawinginput" name="drawinginput" value="" />

        <input type="button" class="tool-btn" id="btn-draw"   style="left: 2px;   top: 144px; width: 44px;" value="Draw"   onclick="setTool('draw');" />
        <input type="button" class="tool-btn" id="btn-fill"   style="left: 48px;  top: 144px; width: 44px;" value="Fill"   onclick="setTool('fill');" />
        <input type="button" class="tool-btn" id="btn-eraser" style="left: 94px;  top: 144px; width: 44px;" value="Eraser" onclick="setTool('eraser');" />
        <input type="button" class="tool-btn"                 style="left: 140px; top: 144px; width: 44px;" value="Undo"   onclick="undo();" />
        <input type="button" class="tool-btn"                 style="left: 186px; top: 144px; width: 44px;" value="Clear"  onclick="wipe();" />
        <!-- Runs the canvas primitive battery and prints the scores on the top line. -->
        <input type="button" class="tool-btn" style="left: 232px; top: 144px; width: 44px; background: #ed4245; color: #fff;" value="PROBE" onclick="probeCanvas();" />
        <input type="button" class="tool-btn" style="left: 278px; top: 144px; width: 40px; background: #5865f2; color: #fff;" value="Export" onclick="testExport();" />

        <input type="button" class="size-btn" id="s1" style="left: 2px;  top: 165px; width: 24px;" value="2"  onclick="setSize(2,'s1');" />
        <input type="button" class="size-btn" id="s2" style="left: 28px; top: 165px; width: 24px;" value="5"  onclick="setSize(5,'s2');" />
        <input type="button" class="size-btn" id="s3" style="left: 54px; top: 165px; width: 24px;" value="10" onclick="setSize(10,'s3');" />
        <input type="button" class="size-btn" id="s4" style="left: 80px; top: 165px; width: 24px;" value="20" onclick="setSize(20,'s4');" />

        <!-- "Out: ON/OFF" unbinds draw.js's canvas mouseout->onCanvasMouseUp listener
             at runtime; flip it and try to draw a squiggle to A/B the stroke-kill bug. -->
        <!-- rpt applies draw-3ds.js's border-flip repaint hack after every move. -->
        <input type="button" class="tool-btn" id="btn-rpt" style="left: 108px; top: 165px; width: 40px; height: 16px; background: #3ba55d; color: #fff;" value="rpt:OFF" onclick="toggleRepaint();" />
        <input type="button" class="tool-btn" style="left: 150px; top: 165px; width: 26px; height: 16px; background: #ed4245; color: #fff;" value="INK" onclick="inkCount();" />
        <input type="button" class="tool-btn" id="btn-mouseout" style="left: 178px; top: 165px; width: 34px; height: 16px; background: #faa61a;" value="Out:ON" onclick="toggleMouseOut();" />
        <input type="button" class="tool-btn" id="btn-pd" style="left: 214px; top: 165px; width: 30px; height: 16px; background: #faa61a;" value="pd:ON" onclick="togglePreventDefault();" />
        <input type="button" class="tool-btn" style="left: 246px; top: 165px; width: 28px; height: 16px;" value="Rst" onclick="resetLog();" />
        <input type="button" class="tool-btn" style="left: 276px; top: 165px; width: 42px; height: 16px;" value="Real" onclick="location.href='/draw/{$CHANNEL_ID}';" />
    </form>

    <div id="diag">starting…</div>
    </div>

    <script src="/js/draw.js"></script>
    <script type="text/javascript">
    /* Diagnostics only — deliberately kept OUT of draw.js so the engine under test
       runs byte-for-byte identical to the one the standard page ships. Everything
       here is passive: extra listeners that observe, never draw. */
    (function () {
        var diag = document.getElementById('diag');
        // mousemove/mouseup are counted separately per target: on Old 3DS SPIDER the
        // drag fires them on document while the canvas sees none, and telling the two
        // apart is exactly what decides whether one shared engine can serve both.
        var counts = {
            mousedown: 0, click: 0,
            'mousemove@canvas': 0, 'mousemove@doc': 0,
            'mouseup@canvas': 0, 'mouseup@doc': 0,
            mouseout: 0,
            touchstart: 0, touchmove: 0, touchend: 0
        };
        // Set when a mouseout lands between a mousedown and the next mousemove —
        // i.e. when the stroke was killed before it could ever draw a segment.
        var outKilledStroke = 0;
        var lastEvt = '-';
        var lastCoords = '-';
        var strokeStart = 0;
        var lastStrokeMs = 0;
        var lastStrokeMoves = 0;
        var movesThisStroke = 0;
        var strokeActive = 0;
        var exportInfo = '-';
        var mouseoutBound = true;

        // Engine-level probe state. The counters above only prove events REACH the
        // page; these prove what draw.js does with them — how often its own move
        // handler runs, whether isDrawing was still true when it did, and how far
        // the coordinates it reads actually move during a drag.
        var engCalls = 0;
        var engLive = 0;
        var lastEnginePos = '-';
        var lastMoveSample = '(no move yet)';
        // Total per-stroke travel of each coordinate source. A source that stays 0
        // while another climbs is frozen — and a frozen source makes every lineTo
        // zero-length, which is exactly what "only dots" looks like.
        var offTravel = 0;
        var cliTravel = 0;
        var posTravel = 0;
        var offPrev = null;
        var cliPrev = null;
        var posPrev = null;

        // Rolling trace of the last events in the order they actually arrived. The
        // counters say what fired; only the order says whether the moves land inside
        // the press (md ... mm mm mm ... mu) or after the browser has already closed
        // it out (md mu cl mm mm mm), which no amount of counting can distinguish.
        var seq = [];
        var seqMax = 16;
        function trace(tok) {
            // Collapse runs of the same token so a burst of moves can't push the
            // interesting md/mu/cl/out markers off the end of the line.
            var last = seq[seq.length - 1];
            if (last && last.tok === tok) {
                last.n++;
            } else {
                seq.push({ tok: tok, n: 1 });
                if (seq.length > seqMax) seq.shift();
            }
        }
        function seqText() {
            var parts = [];
            for (var i = 0; i < seq.length; i++) {
                parts.push(seq[i].n > 1 ? seq[i].tok + 'x' + seq[i].n : seq[i].tok);
            }
            return parts.length ? parts.join(' ') : '(nothing yet)';
        }

        // preventDefault A/B. draw.js calls e.preventDefault() in onCanvasMouseDown;
        // draw-3ds.js does NOT on its Old 3DS path (only on the Wii/DSi one). If
        // cancelling the default is what makes SPIDER close the press immediately,
        // that difference alone would explain why DSiPaint drags and this does not.
        var pdEnabled = true;
        var probeInfo = '';

        // Repaint nudge. The retired draw-3ds.js flipped the canvas border between
        // #000 and #111 on every mousemove — a hack to force the browser to
        // recomposite the canvas. That was the whole difference: ink reached the
        // backing store (PROBE shows every primitive painting) while the screen kept
        // showing only the mousedown dot. draw.js now does this itself via
        // nudgeRepaint(), so this toggle only adds a second, redundant flip; it is
        // kept so the effect can still be demonstrated in isolation.
        var repaintNudge = false;
        var nudgeToggle = 0;

        var ua = navigator.userAgent;
        var uaShort = ua.length > 52 ? ua.substring(0, 52) : ua;

        function fields(e) {
            var f = [];
            if (e.offsetX !== undefined) f.push('off');
            if (e.layerX !== undefined) f.push('layer');
            if (e.clientX !== undefined) f.push('client');
            if (e.pageX !== undefined) f.push('page');
            return f.length ? f.join('/') : 'none';
        }

        function render() {
            var canvas = document.getElementById('sketchpad');
            diag.innerHTML =
                (probeInfo || uaShort) + '<br />' +
                'scr ' + screen.width + 'x' + screen.height +
                ' buf ' + canvas.width + 'x' + canvas.height +
                ' css ' + (canvas.style.width || 'native') +
                ' t ' + counts.touchstart + '/' + counts.touchmove + '/' + counts.touchend + '<br />' +
                'md ' + counts.mousedown + ' cl ' + counts.click +
                ' | mm cv ' + counts['mousemove@canvas'] + ' doc ' + counts['mousemove@doc'] +
                ' | mu cv ' + counts['mouseup@canvas'] + ' doc ' + counts['mouseup@doc'] +
                ' | out ' + counts.mouseout + ' kill ' + outKilledStroke + '<br />' +
                'isDrawing ' + (typeof isDrawing !== 'undefined' ? (isDrawing ? 'Y' : 'N') : '?') +
                ' | bind ' + (mouseoutBound ? 'ON' : 'OFF') +
                ' | eng mm ' + engCalls + ' live ' + engLive + '<br />' +
                'TRAVEL off ' + offTravel + ' cli ' + cliTravel + ' pos ' + posTravel +
                ' | pd ' + (pdEnabled ? 'ON' : 'OFF') +
                ' | rpt ' + (repaintNudge ? 'ON' : 'OFF') + '<br />' +
                'SEQ ' + seqText() + '<br />' +
                'stroke ' + lastStrokeMoves + ' in ' + lastStrokeMs + 'ms | exp ' + exportInfo;
        }

        function note(name, onCanvas) {
            // mousemove/mouseup are observed on both the canvas and document, so a
            // single bubbling event reaches this twice on browsers where both fire.
            // Per-target counters stay honest; the stroke stats only take the first.
            var key = name === 'mousemove' || name === 'mouseup'
                ? name + (onCanvas ? '@canvas' : '@doc')
                : name;
            var token = {
                mousedown: 'md',
                mousemove: 'mm',
                mouseup: 'mu',
                mouseout: 'out',
                click: 'cl',
                touchstart: 'ts',
                touchmove: 'tm',
                touchend: 'te'
            }[name];
            return function (e) {
                e = e || window.event;
                counts[key] = (counts[key] || 0) + 1;
                var duplicate = e.__diagSeen;
                e.__diagSeen = 1;
                if (!duplicate) trace(token);
                var x = e.offsetX !== undefined ? e.offsetX : (e.layerX !== undefined ? e.layerX : e.clientX);
                var y = e.offsetY !== undefined ? e.offsetY : (e.layerY !== undefined ? e.layerY : e.clientY);
                if (e.touches && e.touches.length) {
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                }
                lastEvt = name + (onCanvas ? '@canvas' : '@doc') + ' [' + fields(e) + ']';
                lastCoords = x + ',' + y;
                if (!duplicate) {
                    if (name === 'mousedown' || name === 'touchstart') {
                        strokeStart = new Date().getTime();
                        movesThisStroke = 0;
                        strokeActive = 1;
                        offTravel = cliTravel = posTravel = 0;
                        offPrev = cliPrev = posPrev = null;
                    } else if (name === 'mouseout') {
                        // The smoking gun: draw.js binds mouseout -> onCanvasMouseUp,
                        // which clears isDrawing. A stylus has no hover, so if this
                        // lands mid-stroke every later mousemove is discarded.
                        if (strokeActive && movesThisStroke === 0) outKilledStroke++;
                    } else if (name === 'mousemove' || name === 'touchmove') {
                        movesThisStroke++;
                    } else if (name === 'mouseup' || name === 'touchend') {
                        lastStrokeMs = new Date().getTime() - strokeStart;
                        lastStrokeMoves = movesThisStroke;
                        strokeActive = 0;
                    }
                }
                render();
            };
        }

        function bind(target, name, onCanvas) {
            var h = note(name, onCanvas);
            if (target.addEventListener) {
                target.addEventListener(name, h, false); // bubble phase: never competes with draw.js
            }
        }

        var canvas = document.getElementById('sketchpad');
        bind(canvas, 'mousedown', true);
        bind(canvas, 'mouseup', true);
        bind(canvas, 'click', true);
        bind(canvas, 'touchstart', true);
        bind(canvas, 'touchmove', true);
        bind(canvas, 'touchend', true);
        // Old 3DS SPIDER fires the drag's mousemove/mouseup on document, not on the
        // canvas — counting both tells us which path the console actually takes.
        bind(document, 'mousemove', false);
        bind(document, 'mouseup', false);
        bind(canvas, 'mousemove', true);
        bind(canvas, 'mouseout', true);

        // A/B switch for the mouseout hypothesis. draw.js binds
        //   canvas.addEventListener('mouseout', onCanvasMouseUp, true)
        // for every non-Wii/non-DSi client, Old 3DS included, and onCanvasMouseUp
        // sets isDrawing = false. draw-3ds.js never binds mouseout on its Old 3DS
        // path — which is exactly why the DSiPaint engine tracks strokes here and
        // this one only leaves dots. Because onCanvasMouseUp is a global, the
        // listener can be removed at runtime and put back, so the console can test
        // both behaviours on one page load with draw.js still unmodified.
        window.toggleMouseOut = function () {
            var btn = document.getElementById('btn-mouseout');
            if (!canvas.removeEventListener) {
                if (btn) btn.value = 'no removeEL';
                return;
            }
            if (mouseoutBound) {
                canvas.removeEventListener('mouseout', onCanvasMouseUp, true);
                mouseoutBound = false;
            } else {
                canvas.addEventListener('mouseout', onCanvasMouseUp, true);
                mouseoutBound = true;
            }
            if (btn) btn.value = mouseoutBound ? 'Out: ON' : 'Out: OFF';
            render();
        };

        window.testExport = function () {
            var t = new Date().getTime();
            try {
                var data = document.getElementById('sketchpad').toDataURL('image/png');
                document.getElementById('drawinginput').value = data;
                exportInfo = data.length + 'b in ' + (new Date().getTime() - t) + 'ms';
            } catch (ex) {
                exportInfo = 'FAILED (' + (ex.message || ex) + ')';
            }
            render();
        };

        // Wrap draw.js's OWN mousemove handler. onCanvasMouseMove and getPos are
        // globals, so the real listener can be swapped for one that records what the
        // engine saw and then calls straight through — the drawing behaviour is
        // unchanged, we just get to watch it. This is the measurement that separates
        // the two remaining explanations for "only dots":
        //   engLive == 0        -> isDrawing was already false (the mouseout kill)
        //   engLive > 0 but
        //   offTravel == 0
        //   while cliTravel > 0 -> SPIDER freezes offsetX/offsetY during a stylus
        //                          drag, so getPos() returns the press point every
        //                          time and every lineTo is zero-length. draw-3ds.js
        //                          reads clientX instead, which is why the DSiPaint
        //                          engine tracks strokes on the same events.
        function wrapEngineMove() {
            if (typeof onCanvasMouseMove !== 'function' || !document.addEventListener) return;
            var real = onCanvasMouseMove;
            // draw.js binds this on document for Old 3DS and on the canvas otherwise.
            // Drop both, then re-bind the probe on document so either layout is caught.
            if (canvas.removeEventListener) canvas.removeEventListener('mousemove', real, true);
            document.removeEventListener('mousemove', real, true);
            document.addEventListener(
                'mousemove',
                function (e) {
                    e = e || window.event;
                    engCalls++;
                    if (typeof isDrawing !== 'undefined' && isDrawing) engLive++;

                    var ox = e.offsetX;
                    var oy = e.offsetY;
                    var cx = e.clientX;
                    var cy = e.clientY;
                    if (ox !== undefined) {
                        if (offPrev) offTravel += Math.abs(ox - offPrev[0]) + Math.abs(oy - offPrev[1]);
                        offPrev = [ox, oy];
                    }
                    if (cx !== undefined) {
                        if (cliPrev) cliTravel += Math.abs(cx - cliPrev[0]) + Math.abs(cy - cliPrev[1]);
                        cliPrev = [cx, cy];
                    }
                    // What getPos() actually hands the drawing code, resolved through
                    // the same preference chain the engine uses.
                    if (typeof getPos === 'function') {
                        try {
                            var p = getPos(e);
                            var px = Math.round(p.x);
                            var py = Math.round(p.y);
                            if (posPrev) posTravel += Math.abs(px - posPrev[0]) + Math.abs(py - posPrev[1]);
                            posPrev = [px, py];
                            lastEnginePos = px + ',' + py;
                        } catch (ex) {
                            lastEnginePos = 'threw';
                        }
                    }
                    lastMoveSample = 'off ' + ox + ',' + oy + ' cli ' + cx + ',' + cy;

                    real(e);
                    if (repaintNudge) {
                        // Same trick draw-3ds.js uses on every move: change a style
                        // property on the canvas so the browser recomposites it.
                        canvas.style.borderColor =
                            '#' + (nudgeToggle ^= 1) + nudgeToggle + nudgeToggle;
                    }
                    render();
                },
                true
            );
        }
        wrapEngineMove();

        // Wrap draw.js's mousedown so its preventDefault() call can be neutralised
        // without editing draw.js. When pd is OFF the handler receives a stand-in
        // carrying the same coordinate fields but a no-op preventDefault, so the
        // engine behaves identically except that the browser's default press
        // handling is left alone — matching what draw-3ds.js does on Old 3DS.
        function wrapEngineDown() {
            if (typeof onCanvasMouseDown !== 'function' || !canvas.addEventListener) return;
            var real = onCanvasMouseDown;
            if (canvas.removeEventListener) canvas.removeEventListener('mousedown', real, true);
            canvas.addEventListener(
                'mousedown',
                function (e) {
                    e = e || window.event;
                    if (pdEnabled) return real(e);
                    var shim = {
                        offsetX: e.offsetX,
                        offsetY: e.offsetY,
                        layerX: e.layerX,
                        layerY: e.layerY,
                        clientX: e.clientX,
                        clientY: e.clientY,
                        pageX: e.pageX,
                        pageY: e.pageY,
                        preventDefault: function () {}
                    };
                    return real(shim);
                },
                true
            );
        }
        wrapEngineDown();

        window.togglePreventDefault = function () {
            pdEnabled = !pdEnabled;
            var btn = document.getElementById('btn-pd');
            if (btn) btn.value = pdEnabled ? 'pd: ON' : 'pd: OFF';
            render();
        };

        // Canvas primitive probe. Input is now ruled out — the engine runs, isDrawing
        // is true, coordinates travel — yet the mousedown dot (arc+fill) appears and
        // the move segments (moveTo/lineTo/stroke) do not. So the question is which
        // canvas operations actually put ink on the screen on this device.
        //
        // Each case runs on a freshly cleared canvas and is scored by counting
        // non-white pixels, so "did it paint" is measured, not eyeballed. The cases
        // are ordered to isolate one variable at a time:
        //   arc    - the dot that already works, as a control
        //   strk   - exactly what onCanvasMouseMove does: stroke relying on
        //            strokeStyle/lineWidth set earlier, in an EARLIER event
        //   strk+s - the same stroke with strokeStyle/lineWidth set immediately
        //            before it, which is what draw-3ds.js does on every move
        //   strk+c - as above plus lineCap/lineJoin, which draw-3ds.js sets at init
        //            and draw.js never sets at all
        //   frect  - fillRect, a fill that is not a path
        //   srect  - strokeRect, a stroke that is not a built path
        //   dots   - the drawInterpolatedLine approach: arc+fill repeated along the
        //            segment, i.e. a line built only from the primitive known to work
        //
        // strk 0 with strk+s > 0 means the context does not carry state across
        // events here and the fix is to set it per move. strk+s 0 with dots > 0
        // means stroke() is unusable and lines must be drawn as interpolated fills.
        function probeCanvas() {
            var ctx2 = canvas.getContext('2d');
            var w = canvas.width;
            var h = canvas.height;
            var results = [];

            function clear() {
                // Preserve fillStyle: the arc and strk cases deliberately rely on
                // state set earlier, and clearing must not be what supplies it.
                var prevFill = ctx2.fillStyle;
                ctx2.fillStyle = '#ffffff';
                ctx2.fillRect(0, 0, w, h);
                ctx2.fillStyle = prevFill;
            }
            function ink() {
                try {
                    var d = ctx2.getImageData(0, 0, w, h).data;
                    var n = 0;
                    for (var i = 0; i < d.length; i += 4) {
                        if (d[i] < 128 || d[i + 1] < 128 || d[i + 2] < 128) n++;
                    }
                    return n;
                } catch (ex) {
                    return -1; // getImageData unavailable: score is unknown, not zero
                }
            }
            function run(label, fn) {
                clear();
                try {
                    fn();
                    results.push(label + ' ' + ink());
                } catch (ex) {
                    results.push(label + ' ERR');
                }
            }

            // Restore the state the engine would normally be in, then leave it alone
            // for the "strk" case so it is tested exactly as the drag leaves it.
            ctx2.fillStyle = '#000000';
            ctx2.strokeStyle = '#000000';
            ctx2.lineWidth = 5;

            run('arc', function () {
                ctx2.beginPath();
                ctx2.arc(60, 70, 5, 0, Math.PI * 2, false);
                ctx2.fill();
            });
            run('strk', function () {
                ctx2.beginPath();
                ctx2.moveTo(20, 20);
                ctx2.lineTo(200, 20);
                ctx2.stroke();
            });
            run('strk+s', function () {
                ctx2.strokeStyle = '#000000';
                ctx2.lineWidth = 5;
                ctx2.beginPath();
                ctx2.moveTo(20, 30);
                ctx2.lineTo(200, 30);
                ctx2.stroke();
            });
            run('strk+c', function () {
                ctx2.strokeStyle = '#000000';
                ctx2.lineWidth = 5;
                ctx2.lineCap = 'round';
                ctx2.lineJoin = 'round';
                ctx2.beginPath();
                ctx2.moveTo(20, 40);
                ctx2.lineTo(200, 40);
                ctx2.stroke();
            });
            run('frect', function () {
                ctx2.fillStyle = '#000000';
                ctx2.fillRect(20, 50, 60, 10);
            });
            run('srect', function () {
                ctx2.strokeStyle = '#000000';
                ctx2.lineWidth = 5;
                ctx2.strokeRect(20, 70, 60, 10);
            });
            run('dots', function () {
                ctx2.fillStyle = '#000000';
                for (var i = 0; i <= 60; i++) {
                    ctx2.beginPath();
                    ctx2.arc(20 + i * 3, 90, 2.5, 0, Math.PI * 2, false);
                    ctx2.fill();
                }
            });

            clear();
            probeInfo = 'PROBE ' + results.join(' | ');
            // Put the engine's own state back so drawing still works afterwards.
            if (typeof setColor === 'function') setColor(currColor, 'c1');
            if (typeof setSize === 'function') setSize(currSize, 's2');
            render();
        }
        window.probeCanvas = probeCanvas;

        // Counts what is actually IN the canvas right now, without clearing it. PROBE
        // scores getImageData, so it only ever proved ink reaches the backing store —
        // never that it reaches the screen. Draw a squiggle, then tap INK:
        //   a few dozen pixels -> the segments really are not being drawn
        //   several hundred+   -> the line IS there and the display is not updating,
        //                         which is what the repaint nudge is for
        window.inkCount = function () {
            var ctx2 = canvas.getContext('2d');
            try {
                var d = ctx2.getImageData(0, 0, canvas.width, canvas.height).data;
                var n = 0;
                for (var i = 0; i < d.length; i += 4) {
                    if (d[i] < 128 || d[i + 1] < 128 || d[i + 2] < 128) n++;
                }
                probeInfo = 'INK ' + n + ' px on canvas (screen may differ)';
            } catch (ex) {
                probeInfo = 'INK failed: ' + (ex.message || ex);
            }
            render();
        };

        window.toggleRepaint = function () {
            repaintNudge = !repaintNudge;
            var btn = document.getElementById('btn-rpt');
            if (btn) btn.value = repaintNudge ? 'rpt: ON' : 'rpt: OFF';
            render();
        };

        window.resetLog = function () {
            for (var k in counts) counts[k] = 0;
            lastEvt = '-';
            lastCoords = '-';
            lastStrokeMs = 0;
            lastStrokeMoves = 0;
            outKilledStroke = 0;
            engCalls = 0;
            engLive = 0;
            lastEnginePos = '-';
            lastMoveSample = '(no move yet)';
            offTravel = cliTravel = posTravel = 0;
            offPrev = cliPrev = posPrev = null;
            seq = [];
            exportInfo = '-';
            render();
        };

        render();
    })();
    </script>
</body>
</html>
