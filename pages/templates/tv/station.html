<!doctype html>
<html class="page-simple">
  <head>
    {$COMMON_HEAD}
    <title>Discross - {$STATION_NAME}</title>
  </head>

  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
      <table style="width: 100%">
        <tr valign="middle">
          <td>
            <a href="/server/"><img src="/resources/logo.gif" alt="Logo" /></a>
          </td>
          <td>
            <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd"
              >discross</font
            >
          </td>
          <td width="100%" align="right">
            <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd"
              >&#160;&#160; {$MENU_OPTIONS}</font
            >
          </td>
          <td valign="middle" style="padding-right: 8px;">
            <a href="/switchtheme"
              ><img
                src="/resources/twemoji/1f313.gif"
                alt="Switch theme"
                width="36"
                height="36"
                style="background: none; border: none"
            /></a>
          </td>
        </tr>
      </table>
      <hr style="margin: 0" />
      <br />
      <table>
        <tr>
          <td>&nbsp;&nbsp;&nbsp;&nbsp;</td>
          <td>
            <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
              <a
                href="{$BACK_URL}"
                class="discross-button"
                style="
                  padding: 6px 14px;
                  font-size: 14px;
                  margin: 0 0 12px 0;
                  display: inline-block;
                "
                >&#8592; Back</a
              >
              <br /><br />
              <font size="5">{$STATION_NAME}</font>
              <br />
              <font size="2" color="#72767d">
                <form method="GET" action="/tv/station/{$STATION_ID}" style="display: inline">
                  <input type="hidden" name="sessionID" value="{$SESSION_ID}" />
                  Date:
                  <input
                    type="text"
                    name="date"
                    value="{$DATE_VALUE}"
                    placeholder="YYYY-MM-DD"
                    style="
                      color: #dddddd;
                      background: #222327;
                      border: none;
                      width: 110px;
                      outline: none;
                      font-family: 'rodin', Arial, Helvetica, sans-serif;
                      font-size: 13px;
                      padding: 4px 8px;
                    "
                  />
                  <button
                    type="submit"
                    class="discross-button"
                    style="padding: 4px 12px; margin: 0; font-size: 13px"
                  >
                    Go
                  </button>
                </form>
              </font>
              <br /><br />
              {$TV_CONTENT}
              <br /><br />
              <font size="2" color="#72767d"
                >TV listings courtesy of
                <a href="https://www.tvpassport.com/" style="color: #5865f2">TVPassport</a></font
              >
            </font>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
