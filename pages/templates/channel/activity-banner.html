<table cellpadding="0" cellspacing="0" class="activity-banner" style="margin: 8px 0; border: 1px solid {$BORDER_COLOR}; border-radius: 8px; background: {$BG_COLOR}; width: 100%; max-width: 400px;">
  <tr>
    <td style="padding: 12px; width: 48px; vertical-align: top;">
      <img src="{$ACTIVITY_ICON}" width="48" height="48" style="border-radius: 8px; display: block;" alt="" />
    </td>
    <td style="padding: 12px; padding-left: 0; vertical-align: middle;">
      <font style="font-size: 14px; font-weight: 600; color: {$AUTHOR_COLOR};" face="rodin,sans-serif">{$AUTHOR_NAME}</font><br />
      <font style="font-size: 14px; color: {$TEXT_COLOR};" face="rodin,sans-serif">{$ACTIVITY_TEXT}</font><br />
      <font style="font-size: 12px; color: {$MUTE_COLOR};" face="rodin,sans-serif">{$DURATION_AGO}</font>
    </td>
  </tr>
</table>
