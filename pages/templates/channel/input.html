<div class="message-input-bar-wrapper" style="position: relative; background: {$COLOR}; border-radius: 8px; margin: 8px 0; overflow: hidden;">
    <input type="submit" class="send-button-input" value="Send"
        style="position: absolute; right: 0; top: 0; bottom: 0; height: auto; border: none; border-radius: 4px; color: white; padding: 0 24px; cursor: pointer; font-family: rodin, Whitney, Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; text-align: center; white-space: nowrap; background: #5865f2;"
        onmouseover="this.style.background='#4752c4'"
        onmouseout="this.style.background='#5865f2'">
    <input type="text" name="message" id="message" value="" class="message-input-field"
        style="width: 100%; box-sizing: border-box; -moz-box-sizing: border-box; background: transparent; border: none; outline: none; height: 41px; padding: 0 90px 0 16px; font-family: 'rodin', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; line-height: 41px;"
        placeholder="Message {$CHANNEL_NAME}">
</div>
