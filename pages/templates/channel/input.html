<div class="message-input-bar-wrapper">
  <table>
    <tr>
      <td style="width: 100%; padding: 0">
        <textarea name="message" id="message" class="message-input-field" placeholder="Message {$CHANNEL_NAME}" onkeydown="return handleMessageKeydown(event);" oninput="autoResize(this)" rows="1"></textarea>
      </td>
      <td style="padding: 0 4px 0 0">
        <input type="hidden" id="nonce" name="nonce" value="" />
        <input type="submit" class="send-button-input" value="Send" />
      </td>
    </tr>
  </table>
</div>
