<!DOCTYPE html>
<html lang="en" class="page-simple">

<head>
  {$COMMON_HEAD}
  <title>Discross - Search</title>
</head>

<body style="margin: 0;" {$WHITE_THEME_ENABLED}>
  <div id="wrapper">
    <table style="width: 100%;">
      <tr valign="middle">
        <td><a href="/server/"><img src="/resources/logo.gif" alt="Logo"></a></td>
        <td>
          <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
        </td>
        <td width="100%" align="right">
          <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160; {$MENU_OPTIONS}</font>
        </td>
        <td valign="middle">
          <a href="/switchtheme"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none; padding: 4px;"></a>
        </td>
      </tr>
    </table>
    <hr style="margin: 0;">
    <br>
    <table>
      <tr>
        <td>
          &nbsp;&nbsp;&nbsp;&nbsp;
        </td>
        <td>
          <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
            <font size="5">Search</font>
            <br><br>
            <form method="GET" action="/search">
              <input type="hidden" name="sessionID" value="{$SESSION_ID}">
              <table cellpadding="0" cellspacing="4">
                <tr>
                  <td>
                    <div style="padding: 8px 12px; background: #222327; display: block; width: 100%;">
                      <input type="text" name="q" value="{$QUERY_VALUE}" placeholder="Enter search query..."
                        style="color: #dddddd; background: #222327; border: none; width: 100%; min-width: 120px; outline: none; font-family: 'rodin', Arial, Helvetica, sans-serif; font-size: 15px;">
                    </div>
                  </td>
                  <td style="padding-left: 8px;">
                    <button type="submit" class="discross-button" style="padding: 8px 18px; margin: 0; font-size: 15px;">Search</button>
                  </td>
                </tr>
                <tr>
                  <td colspan="2" style="padding-top: 8px;">
                    <font size="3" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">Search engine:</font><br>
                    <label style="font-size: 14px;">
                      <input type="radio" name="engine" value="frogfind" {$FROGFIND_CHECKED}> FrogFind <font size="2" color="#72767d">(for old browsers)</font>
                    </label><br>
                    <label style="font-size: 14px;">
                      <input type="radio" name="engine" value="wiby" {$WIBY_CHECKED}> Wiby.me <font size="2" color="#72767d">(for classic sites)</font>
                    </label><br>
                    <label style="font-size: 14px;">
                      <input type="radio" name="engine" value="google" {$GOOGLE_CHECKED}> Google <font size="2" color="#72767d">(for modern browsers)</font>
                    </label>
                  </td>
                </tr>
              </table>
            </form>
          </font>
        </td>
      </tr>
    </table>
  </div>
</body>

</html>
