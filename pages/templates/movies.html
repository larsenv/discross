<!doctype html>
<html class="page-simple">
  <head>

  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
      <table style="width: 100%">
        <tr valign="middle">
          <td>
            <a href="/server/"><img src="/resources/logo.gif" alt="Logo" /></a>
          </td>
          <td>
            <font
              size="7"
              face="'rodin', Arial, Helvetica, sans-serif"
              color="#dddddd"

          <td width="100%" align="right">

              size="4"
              face="'rodin', Arial, Helvetica, sans-serif"

              <br />
