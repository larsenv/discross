<!DOCTYPE html>
<html class="page-simple">

<head>
  {$COMMON_HEAD}
  <title>Discross - TV Guide</title>
</head>

<body style="margin: 0;" {$WHITE_THEME_ENABLED}>
  <div id="wrapper">
    <table style="width: 100%;">
      <tr valign="middle">
        <td><a href="/server/"><img src="/resources/logo.gif" alt="Logo"></a></td>
        <td>
          <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
        </td>
        <td width="100%" align="right">
          <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160; {$MENU_OPTIONS}</font>
        </td>
        <td valign="middle">
          <a href="/switchtheme"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none; padding: 4px;"></a>
        </td>
      </tr>
    </table>
    <hr style="margin: 0;">
    <br>
    <table>
      <tr>
        <td>
          &nbsp;&nbsp;&nbsp;&nbsp;
        </td>
        <td>
          <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
            <font size="5">TV Guide</font>
            <br><br>
            <form method="GET" action="/tv">
              <input type="hidden" name="sessionID" value="{$SESSION_ID}">
              <table cellpadding="0" cellspacing="4">
                <tr>
                  <td>
                    <div style="padding: 8px 12px; background: #222327; display: inline-block;">
                      <input type="text" name="zip" value="{$ZIP_VALUE}" placeholder="ZIP code (e.g. 10001)"
                        style="color: #dddddd; background: #222327; border: none; width: 160px; outline: none; font-family: 'rodin', Arial, Helvetica, sans-serif; font-size: 15px;">
                    </div>
                  </td>
                  <td style="padding-left: 8px;">
                    <div style="padding: 8px 12px; background: #222327; display: inline-block;">
                      <input type="text" name="date" value="{$DATE_VALUE}" placeholder="YYYY-MM-DD"
                        style="color: #dddddd; background: #222327; border: none; width: 110px; outline: none; font-family: 'rodin', Arial, Helvetica, sans-serif; font-size: 15px;">
                    </div>
                  </td>
                  <td style="padding-left: 8px;">
                    <button type="submit" class="discross-button" style="padding: 8px 18px; margin: 0; font-size: 15px;">Go</button>
                  </td>
                </tr>
              </table>
            </form>
            <br>
            {$TV_CONTENT}
            <br><br>
            <font size="2" color="#72767d">TV listings courtesy of <a href="https://www.tvpassport.com/" style="color: #5865f2;">TVPassport</a></font>
          </font>
        </td>
      </tr>
    </table>
  </div>
</body>

</html>
