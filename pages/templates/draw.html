<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/themes.css">
    <link rel="stylesheet" href="/css/components.css">
    <title>Discross - #{$CHANNEL_NAME}</title>
    <style>
        @font-face {
            font-family: 'rodin';
            src: url('https://mariocube.com/css/RodinNTLGPro-DB-AlphaNum.woff2') format('woff2'),
                 url('https://mariocube.com/css/RodinNTLGPro-DB-AlphaNum.woff') format('woff');
            font-weight: 400;
        }

        @font-face {
            font-family: 'rodin';
            src: url('https://mariocube.com/css/RodinNTLGPro-B-AlphaNum.woff2') format('woff2'),
                 url('https://mariocube.com/css/RodinNTLGPro-B-AlphaNum.woff') format('woff');
            font-weight: 700;
        }

        /* Global reset + consistent box sizing and font */
        /* Note: *::before/*::after omitted — the CSS3 double-colon syntax can
           trigger Opera 9.x (DSi) to attempt schema validation at xml.opera.com */
        * {
            box-sizing: border-box;
        }

        html,
        body,
        #wrapper {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'rodin', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: #36393f;
            color: #dcddde;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Light theme overrides */
        .light-theme body {
            background: #f9f9f9 !important;
            color: #2e3338 !important;
        }

        .light-theme #wrapper {
            background: #f9f9f9 !important;
            color: #2e3338 !important;
        }

        .light-theme .message {
            border-color: #e3e5e8 !important;
        }

        .light-theme .message .content {
            color: #2e3338 !important;
        }

        /* AMOLED theme overrides - true black theme for maximum contrast and battery savings */
        .amoled-theme body {
            background: #000000 !important;
            color: #ffffff !important;
        }

        .amoled-theme #wrapper {
            background: #000000 !important;
            color: #ffffff !important;
        }

        .amoled-theme .message {
            border-color: #333333 !important;
            background: #000000 !important;
        }

        .amoled-theme .message .content {
            color: #ffffff !important;
        }

        .amoled-theme .message:hover {
            background: rgba(255, 255, 255, 0.05) !important;
        }

        .amoled-theme #emoji {
            background: #111111 !important;
            border-color: #333333 !important;
        }

        .amoled-theme #emoji a:hover {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .amoled-theme .menu-button {
            background: #000000 !important;
            border-color: #333333 !important;
            color: #ffffff !important;
        }

        .amoled-theme a {
            color: #5865f2 !important;
        }

        .message:hover {
            background: rgba(4, 4, 5, 0.07);
        }

        .light-theme .message:hover {
            background: rgba(6, 6, 7, 0.02) !important;
        }

        /* Hide legacy styling */
        br.nodisp {
            display: none;
        }

        /* Legacy table fixes */
        table {
            padding-bottom: 5px;
        }

        /* Links */
        a {
            color: #00aff4;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Emoji picker styling */
        #emoji {
            background: #2f3136;
            border: 1px solid #40444b;
            border-radius: 8px;
            padding: 16px;
            margin: 8px 0;
        }

        #emoji table {
            width: 100%;
        }

        #emoji a {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
            text-decoration: none;
        }

        #emoji a:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        /* Menu positioning */
        .menu-button {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: none !important;
            border: none;
            padding: 0;
            cursor: pointer;
            display: block;
        }
        .menu-button img { width: 24px; height: 24px; display: block; }
        .menu-icon { width: 24px; height: 24px; display: block; }

        /* Responsive design */
        @media (max-width: 768px) {
            .menu-button {
                top: 8px;
                left: 8px;
            }
        }

        /* Message input - fixed to bottom of viewport, full width, matching channel page */
        .message-form-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #36393f;
            border-top: 1px solid #40444b;
            padding: 12px;
        }

        .message-buttons-container {
            /* Fallback layout for old browsers */
            width: 100%;
            max-width: 100%;
            /* Use table-cell layout as flexbox fallback for very old browsers */
            display: table;
            table-layout: fixed;
            box-sizing: border-box;
            padding: 8px;
        }

        .message-button-cell {
            display: table-cell;
            width: 32px;
            text-align: center;
            vertical-align: middle;
        }

        /* Modern browsers will still use flex if supported */
        .modern-flex {
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* Light theme adjustments for message form */
        .light-theme .message-form-container {
            background: #f9f9f9 !important;
            border-top-color: #e3e5e8 !important;
        }

        /* AMOLED theme adjustments for message form */
        .amoled-theme .message-form-container {
            background: #000000 !important;
            border-top-color: #333333 !important;
        }

        /* Add bottom padding to body so fixed form doesn't cover canvas */
        body { padding-bottom: 80px; }

        /* Chat container - consistent spacing */
        .chat, .chat-container, #chat {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 920px;
            margin: 0 auto;
        }

        /* Message list: readable box */
        .message-list {
            padding: 12px;
            border-radius: 8px;
            background: #2f3136;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            overflow-y: auto;
            max-height: 60vh;
        }

        /* Chat input area: flex so input shrinks correctly and button won't overflow */
        .chat-input, .composer, .message-composer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: transparent;
        }

        /* Input/textarea should grow and allow content to wrap, but never force container width */
        .chat-input input[type="text"],
        .chat-input textarea,
        .message-composer input[type="text"],
        .message-composer textarea {
            flex: 1 1 auto;
            min-width: 0; /* critical to prevent overflow in flex layouts */
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            background: #fff;
            outline: none;
        }

        /* Textarea behavior */
        .chat-input textarea, .message-composer textarea {
            resize: vertical;
            max-height: 30vh;
        }

        /* Send button: size, alignment, and prevent overflow */
        .send-button, .btn-send, button.send, .chat-send {
            flex: 0 0 auto; /* don't grow, don't shrink */
            padding: 10px 14px;
            border-radius: 8px;
            background: #5865f2;
            color: #fff;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            align-self: stretch; /* match input height */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            min-height: 44px; /* accessible tap target */
        }

        /* Focus outlines */
        button:focus, input:focus, textarea:focus {
            box-shadow: 0 0 0 3px rgba(88,101,242,0.12);
            border-color: #5865f2;
        }

        /* Defensive override: if send button was absolutely positioned elsewhere,
           prefer static/flex layout so it stays inside the viewport */
        .chat-footer { position: relative; }
        .chat-footer .send-button {
            position: static !important;
        }

        /* Small screen adjustments */
        @media (max-width: 640px) {
            .chat, .chat-container {
                padding: 12px;
            }

            .send-button, .btn-send {
                padding: 8px 10px;
                min-height: 40px;
                font-size: 0.9rem;
            }
        }

        /* --- TOOLBAR STYLES --- */
        #toolbar-container {
          padding: 5px;
          border-bottom: 1px solid #202225;
          display: table;
          margin: 0 auto 5px auto; 
          border-radius: 8px;
          text-align: left;
          position: relative;
          z-index: 10;
        }

        .c-box {
            width: 24px; height: 24px; /* Smaller to fit snug */
            border: 2px solid #555;
            display: inline-block;
            margin: 1px;
            cursor: pointer;
            vertical-align: middle;
        }

        .s-btn {
            background: #b9bbbe;
            border: 2px solid #000;
            display: inline-block;
            margin: 0 3px;
            cursor: pointer;
            vertical-align: middle;
            padding: 2px;
        }
        
        .s-inner { background: black; font-size: 1px; }

        /* Hide mobile break on desktop */
        .mobile-break {
            display: none;
        }

        /* --- CANVAS STYLES --- */
        #canvas-wrapper {
            margin: 0 auto 20px auto;
            display: block;
            padding: 5px;
            width: 610px; /* Snug fit wrapper */
            max-width: 100%; /* Responsive for mobile */
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        canvas {
            background: #ffffff;
            cursor: crosshair;
            display: block;
            border: 1px solid #202225;
            max-width: 100%; /* Responsive for mobile */
            /* NOTE: do NOT set height:auto here — on canvas elements it does not
               proportionally scale in older browsers (DSi/3DS). Height is managed
               by resizeCanvasDisplay() in JS instead. */
        }

        /* Mobile responsive adjustments */
        @media (max-width: 640px) {
            #toolbar-container {
                width: calc(100% - 16px);
                max-width: 100%;
                margin: 8px 8px 5px 8px;
                padding: 8px 5px;
                box-sizing: border-box;
            }

            /* Mobile responsive adjustments for canvas */
            #canvas-wrapper {
                width: calc(100% - 16px);
                margin: 0 8px 20px 8px;
            }

            /* canvas width/height on small screens is handled by JS to maintain
               aspect ratio on old DS browsers that ignore height:auto on canvas */

            .c-box {
                width: 20px;
                height: 20px;
                margin: 2px;
            }

            .s-btn {
                margin: 0 2px;
            }

            #btn-clear {
                font-size: 12px !important;
                height: 36px !important;
                padding: 0 12px !important;
            }

            /* Show mobile break to put sizes on new line */
            .mobile-break {
                display: block;
            }
        }

        /* DSi (256x192) specific overrides.
           Opera Mobile 9.5 (DSi browser) does not support position:fixed, so the
           send form must fall into normal document flow. Also shrink the toolbar
           color boxes so the page scrolls less on the tiny 256x192 screen. */
        @media (max-width: 256px) {
            /* Drop position:fixed - not supported in Opera Mobile 9.5 (DSi) */
            .message-form-container {
                position: static;
                margin-top: 8px;
                border-top: 1px solid #40444b;
                padding: 6px;
            }
            body { padding-bottom: 0; }

            /* Shrink color boxes from 24px to 15px so two rows + size buttons
               take up less vertical space on the 192px tall screen */
            .c-box {
                width: 15px;
                height: 15px;
                margin: 1px;
            }

            .s-btn {
                margin: 0 1px;
                padding: 1px;
            }

            #btn-clear {
                font-size: 11px !important;
                height: 26px !important;
                padding: 0 6px !important;
            }

            /* Hide emoji picker - too small to be useful on DSi */
            #emoji { display: none !important; }
        }
    </style>
</head>

    <script type="text/javascript">
        var canvas = document.getElementById('sketchpad');
        var ctx = canvas.getContext('2d');
        
        var isDrawing = false;
        var lastX = 0;
        var lastY = 0;
        var currColor = '#000000';
        var currSize = 5;

        // Defaults
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = currSize;
        ctx.strokeStyle = currColor;
        // Fill canvas with white immediately (transparent canvas turns black on some Wii conversions)
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = currColor;

        // Canvas display dimensions (CSS pixels). Stored explicitly so coordinate
        // calculations don't rely on canvas.offsetWidth, which on older Opera (DSi)
        // incorrectly returns the HTML attribute value (600) instead of the actual
        // CSS-constrained display width, causing a 2-3x coordinate scaling error.
        var canvasDisplayW = canvas.width;
        var canvasDisplayH = canvas.height;

        // --- CANVAS DISPLAY RESIZE ---
        // Explicitly set the canvas element's CSS width and height to maintain
        // aspect ratio on small screens. CSS height:auto is unreliable on
        // <canvas> in older browsers (DSi/3DS NetFront/WebKit).
        function resizeCanvasDisplay() {
            var wrapper = document.getElementById('canvas-wrapper');
            // Subtract 10px to account for the 5px padding on each side of #canvas-wrapper
            var maxW = wrapper.offsetWidth - 10;
            if (maxW > 0 && maxW < canvas.width) {
                var ratio = maxW / canvas.width;
                canvasDisplayW = maxW;
                canvasDisplayH = Math.round(canvas.height * ratio);
                canvas.style.width = canvasDisplayW + 'px';
                canvas.style.height = canvasDisplayH + 'px';
            } else if (maxW > 0) {
                canvasDisplayW = canvas.width;
                canvasDisplayH = canvas.height;
                canvas.style.width = '';
                canvas.style.height = '';
            }
            // If maxW <= 0 layout isn't ready yet; values stay at previous setting
        }
        resizeCanvasDisplay();
        // Also run on load to catch any layout changes after inline execution
        if (window.addEventListener) {
            window.addEventListener('load', resizeCanvasDisplay, false);
            window.addEventListener('resize', resizeCanvasDisplay, false);
        } else if (window.attachEvent) {
            window.attachEvent('onload', resizeCanvasDisplay);
            window.attachEvent('onresize', resizeCanvasDisplay);
        }

        // --- COORDINATE SYSTEM ---
        // Primary: e.offsetX/offsetY — coordinates relative to the canvas element.
        // Available in Opera 9+ (DSi browser), Chrome, Safari, IE9+.
        // No scroll correction or element-position traversal needed.
        //
        // Fallback (Firefox <39 and other browsers without offsetX):
        // Use pageX/pageY (document-relative) + canvas document-offset traversal.
        function getCanvasPagePos() {
            var left = 0, top = 0;
            var el = canvas;
            while (el) {
                left += el.offsetLeft || 0;
                top += el.offsetTop || 0;
                el = el.offsetParent;
            }
            return { left: left, top: top };
        }

        function getScrollOffset() {
            var sx, sy;
            if (window.pageXOffset !== undefined) {
                sx = window.pageXOffset;
                sy = window.pageYOffset;
            } else if (document.documentElement && document.documentElement.scrollLeft !== undefined) {
                sx = document.documentElement.scrollLeft;
                sy = document.documentElement.scrollTop;
            } else {
                sx = document.body.scrollLeft || 0;
                sy = document.body.scrollTop || 0;
            }
            return { x: sx, y: sy };
        }

        function getPos(e) {
            // e.offsetX/offsetY: element-relative CSS pixels. Available in Opera 9+.
            // Works correctly regardless of page scroll or element position.
            if (e.offsetX !== undefined) {
                return {
                    x: e.offsetX * (canvas.width / canvasDisplayW),
                    y: e.offsetY * (canvas.height / canvasDisplayH)
                };
            }
            // Fallback: pageX/pageY + canvas page offset
            var scroll = getScrollOffset();
            var pageX = e.pageX !== undefined ? e.pageX : (e.clientX + scroll.x);
            var pageY = e.pageY !== undefined ? e.pageY : (e.clientY + scroll.y);
            var cp = getCanvasPagePos();
            return {
                x: (pageX - cp.left) * (canvas.width / canvasDisplayW),
                y: (pageY - cp.top) * (canvas.height / canvasDisplayH)
            };
        }

        // --- DRAWING EVENTS ---
        canvas.onmousedown = function(e) {
            if(e.preventDefault) e.preventDefault(); // Stop Wii Drag
            isDrawing = true;
            var pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
            
            ctx.beginPath();
            ctx.arc(lastX, lastY, currSize/2, 0, Math.PI*2, false);
            ctx.fillStyle = currColor;
            ctx.fill();
            ctx.beginPath();
            
            return false;
        };

        canvas.onmousemove = function(e) {
            if (!isDrawing) return;
            if(e.preventDefault) e.preventDefault(); 

            var pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            lastX = pos.x;
            lastY = pos.y;
        };

        canvas.onmouseup = function() { isDrawing = false; };
        canvas.onmouseout = function() { isDrawing = false; };

        // --- TOUCH SUPPORT FOR MOBILE ---
        // Add touch event handlers for mobile devices (alongside mouse handlers for Wii compatibility)
        function getTouchPos(e) {
            if (!e.touches || e.touches.length === 0) return null;
            var touch = e.touches[0];
            var scroll = getScrollOffset();
            var pageX = touch.pageX !== undefined ? touch.pageX : (touch.clientX + scroll.x);
            var pageY = touch.pageY !== undefined ? touch.pageY : (touch.clientY + scroll.y);
            var cp = getCanvasPagePos();
            return {
                x: (pageX - cp.left) * (canvas.width / canvasDisplayW),
                y: (pageY - cp.top) * (canvas.height / canvasDisplayH)
            };
        }

        canvas.addEventListener('touchstart', function(e) {
            if(e.preventDefault) e.preventDefault(); // Prevent scrolling
            isDrawing = true;
            var pos = getTouchPos(e);
            if (!pos) return;
            lastX = pos.x;
            lastY = pos.y;
            
            ctx.beginPath();
            ctx.arc(lastX, lastY, currSize/2, 0, Math.PI*2, false);
            ctx.fillStyle = currColor;
            ctx.fill();
            ctx.beginPath();
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
            if (!isDrawing) return;
            if(e.preventDefault) e.preventDefault(); // Prevent scrolling
            
            var pos = getTouchPos(e);
            if (!pos) return;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            lastX = pos.x;
            lastY = pos.y;
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            if(e.preventDefault) e.preventDefault();
            isDrawing = false;
        }, { passive: false });

        canvas.addEventListener('touchcancel', function(e) {
            if(e.preventDefault) e.preventDefault();
            isDrawing = false;
        }, { passive: false });

        // --- UI FUNCTIONS ---
        function setColor(col, id) {
            currColor = col;
            ctx.strokeStyle = currColor;
            
            // Reset borders
            for(var i=1; i<=16; i++) {
                var el = document.getElementById('c'+i);
                if(el) el.style.border = "2px solid #555";
            }
            document.getElementById(id).style.border = "2px solid white";
        }

        function setSize(s, id) {
            currSize = s;
            ctx.lineWidth = currSize;

            for(var i=1; i<=4; i++) {
                var el = document.getElementById('s'+i);
                if(el) el.style.border = "2px solid #000";
            }
            document.getElementById(id).style.border = "2px solid blue";
        }

        function wipe() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = currColor;
        }

        // --- SEND LOGIC ---
        function prepareAndSend() {
            var inputField = document.getElementById('drawinginput');
            var form = document.getElementById('sendform');
            var btn = document.getElementById('btn-send');
            var data = canvas.toDataURL("image/png");
            inputField.value = data;
            form.submit();
        }

        // Initialize UI
        setColor('#000000', 'c1');
        setSize(5, 's2');
    </script>
</html>
