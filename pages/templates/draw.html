<html lang="en" class="page-draw">
<head>
    {$COMMON_HEAD}
    <title>Discross - #{$CHANNEL_NAME}</title>

<body {$WHITE_THEME_ENABLED}>

        <a href="../server/{$SERVER_ID}{$SESSION_PARAM}" class="menu-button">
            <img src="/resources/images/menu.gif" alt="Menu" width="24" height="24" style="width: 24px; height: 24px;" class="menu-icon">
        </a>
        <br>
        <br>
        <div id="toolbar-container">
            <div id="c1" class="c-box" style="background:#000000;" onclick="setColor('#000000', 'c1')"></div><!--
            --><div id="c2" class="c-box" style="background:#555555;" onclick="setColor('#555555', 'c2')"></div><!--

            --><div id="c6" class="c-box" style="background:#ff0000;" onclick="setColor('#ff0000', 'c6')"></div><!--
            --><div id="c7" class="c-box" style="background:#ff9900;" onclick="setColor('#ff9900', 'c7')"></div><!--
            --><div id="c8" class="c-box" style="background:#ffff00;" onclick="setColor('#ffff00', 'c8')"></div>
            <br>
            <div id="c9" class="c-box" style="background:#800080;" onclick="setColor('#800080', 'c9')"></div><!--
            --><div id="c10" class="c-box" style="background:#004d00;" onclick="setColor('#004d00', 'c10')"></div><!--

            --><div id="c12" class="c-box" style="background:#000080;" onclick="setColor('#000080', 'c12')"></div><!--
            --><div id="c13" class="c-box" style="background:#00ffff;" onclick="setColor('#00ffff', 'c13')"></div><!--
            --><div id="c14" class="c-box" style="background:#800080;" onclick="setColor('#800080', 'c14')"></div><!--
            --><div id="c15" class="c-box" style="background:#ff00ff;" onclick="setColor('#ff00ff', 'c15')"></div><!--
            --><div id="c16" class="c-box" style="background:#8b4513;" onclick="setColor('#8b4513', 'c16')"></div>
            <br>
            <div id="s1" class="s-btn" onclick="setSize(2, 's1')"><div class="s-inner" style="width:2px; height:2px;"></div></div><!--
            --><div id="s2" class="s-btn" onclick="setSize(5, 's2')"><div class="s-inner" style="width:5px; height:5px;"></div></div><!--

            --><input type="button" id="btn-fill" onclick="setTool('fill')" value="Fill"><!--
            --><input type="button" id="btn-clear" class="clear-button" onclick="wipe()" value="Clear">
        </div>

        <div id="canvas-wrapper">
            <canvas id="sketchpad" width="600" height="350"></canvas>
        </div>

        <div class="message-form-container">
            <div id="emoji" style="display: none;">
                <table cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :sob:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f62d.gif" alt="sob" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :face_with_raised_eyebrow:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f928.gif" alt="face_with_raised_eyebrow" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :skull:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f480.gif" alt="skull" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :pleading_face:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f97a.gif" alt="pleading_face" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :heart:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/2764-fe0f.gif" alt="heart" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                    </tr>
                    <tr>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :thumbsup:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f44d.gif" alt="thumbsup" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :thumbsdown:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f44e.gif" alt="thumbsdown" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :pray:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f64f.gif" alt="pray" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :tada:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f389.gif" alt="tada" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :slight_smile:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="this.style.background='#444'" onmouseout="this.style.background='none'"><img src="/resources/twemoji/1f642.gif" alt="slight_smile" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                    </tr>
                </table>
            </div>
            <form action="../senddrawing" method="post" id="sendform">
                <input type="hidden" id="channel" name="channel" value="{$CHANNEL_ID}">
                <input type="hidden" name="sessionID" value="{$SESSION_ID}">
                <input type="hidden" id="drawinginput" name="drawinginput" value="">
                <input type="hidden" id="lite" name="lite" value="False">

                <div class="message-input-bar-wrapper" style="background: {$COLOR}; border-radius: 8px; padding: 4px; margin: 8px 0; width: 100%;">
                    <table style="width: 100%; margin: 0; padding: 0; border-collapse: collapse;">
                        <tr>
                            <td style="width: 100%; padding: 0;">
                                <input type="text" name="message" id="message" value="" class="message-input-field"
                                    style="width: 100%; background: transparent; border: none; outline: none; height: 19px; padding: 11px 16px; font-family: 'rodin', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; line-height: 19px;"
                                    placeholder="Message {$CHANNEL_NAME}">
                            </td>
                            <td style="padding: 0 8px 0 0;">
                                <input type="button" onclick="prepareAndSend()" class="send-button-input" value="Send"
                                    style="border: none; border-radius: 4px; color: white; padding: 0px 24px; cursor: pointer; font-family: rodin, Whitney, Helvetica Neue, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; height: 38px; line-height: 38px; text-align: center; white-space: nowrap; margin-right: 8px; background: #5865f2;"
                                    onmouseover="this.style.background='#4752c4'"
                                    onmouseout="this.style.background='#5865f2'">
                            </td>
                        </tr>
                    </table>
                </div>
            </form>
        </div>
    </div>
    <script src="/js/draw.js"></script>
</html>
