<!DOCTYPE html>
<html class="page-channel-reply">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#2b5797">
    <meta name="theme-color" content="#ffffff">
    <title>Discross - #{$CHANNEL_NAME}</title>
    <script>
        for (let i = 0; i < 4; i++) {
            console.log('%cHold Up!', 'font-weight: bold; -webkit-text-fill-color: #5865f2; -webkit-text-stroke-width: 2px; -webkit-text-stroke-color: black; font-size: 71px;');
            console.log('%cIf someone told you to copy/paste something here you have an 11/10 chance you\'re being scammed.', 'font-size: 17px;');
            console.log('%cPasting anything in here could give attackers access to your Discross account.', 'color: red; font-weight: bold; font-size: 17px;');
        }
        console.log('%cUnless you understand exactly what you are doing, close this window and stay safe.', 'font-size: 17px;');
        console.log('%cIf you do understand exactly what you are doing, you should come work with us http://discross.net/jobs/', 'font-size: 17px;');
        window.onload = function () {
            // Enhanced scroll-to-bottom for old browser compatibility
            function scrollToBottom() {
                var end = document.getElementById("end");
                var msgContainer = document.getElementById("msgcontainer");
                var scrollContainer = msgContainer ? msgContainer.parentNode : null;
                
                // Try multiple scroll methods for maximum compatibility
                var scrolled = false;
                
                // Method 1: scrollIntoView on #end element (modern browsers)
                if (end && end.scrollIntoView) {
                    try {
                        end.scrollIntoView();
                        scrolled = true;
                    } catch (e) {
                        // Continue to fallback methods
                    }
                }
                
                // Method 2: Scroll the container holding msgcontainer
                if (!scrolled && scrollContainer && scrollContainer.scrollTop !== undefined) {
                    try {
                        scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        scrolled = true;
                    } catch (e) {
                        // Continue to fallback methods
                    }
                }
                
                // Method 3: Scroll msgcontainer itself
                if (!scrolled && msgContainer && msgContainer.scrollTop !== undefined) {
                    try {
                        msgContainer.scrollTop = msgContainer.scrollHeight;
                        scrolled = true;
                    } catch (e) {
                        // Continue to fallback methods
                    }
                }
                
                // Method 4: Scroll window to #end anchor (old browser fallback)
                if (!scrolled && end) {
                    try {
                        window.location.hash = 'end';
                        scrolled = true;
                    } catch (e) {
                        // Final fallback - scroll window to bottom
                        try {
                            window.scrollTo(0, document.body.scrollHeight);
                        } catch (e2) {
                            // If all else fails, at least try basic body scroll
                            document.body.scrollTop = document.body.scrollHeight;
                        }
                    }
                }
            }
            
            scrollToBottom();
        };

        var emojiShowing = false;

        function showEmoji() {
            var emojiDiv = document.getElementById("emoji");
            if (emojiShowing) {
                emojiDiv.style.display = "none";
                emojiShowing = false;
            } else {
                emojiDiv.style.display = "";
                emojiShowing = true;
                try { emojiDiv.scrollIntoView(); } catch(e) { /* scrollIntoView not supported */ }
            }
        }

        // Spoiler reveal function for Wii compatibility
        function show(el) {
            try {
                el.style.background = "none";
                // Navigate the DOM structure: table -> tbody -> tr -> td -> font
                var tbody = el.childNodes[0];
                if (tbody && tbody.childNodes && tbody.childNodes[0]) {
                    var tr = tbody.childNodes[0];
                    if (tr && tr.childNodes && tr.childNodes[0]) {
                        var td = tr.childNodes[0];
                        if (td && td.childNodes && td.childNodes[0]) {
                            var font = td.childNodes[0];
                            if (font && font.style) {
                                font.style.visibility = "visible";
                            }
                        }
                    }
                }
            } catch (e) {
                // Fallback: just remove background if structure is unexpected
                el.style.background = "none";
            }
        }
        
        // File upload handling (#21) - integrated with send button
        var selectedFile = null;
        
        function handleFileSelect(input) {
            if (input.files && input.files[0]) {
                var file = input.files[0];
                var maxSize = 249 * 1024 * 1024; // 249MB limit for transfer.whalebone.io
                
                if (file.size > maxSize) {
                    alert('File is too large. Maximum size is 249MB.');
                    input.value = '';
                    selectedFile = null;
                    return;
                }
                
                // Check if browser supports fetch API (for older browsers like 3DS)
                if (typeof fetch === 'undefined' || typeof FormData === 'undefined') {
                    // Use traditional form submission for older browsers
                    var uploadForm = document.getElementById('uploadFileForm');
                    var mainFileInput = document.getElementById('fileUpload');
                    
                    // Move the file input to the upload form temporarily
                    uploadForm.appendChild(mainFileInput);
                    mainFileInput.setAttribute('name', 'file');
                    
                    uploadFileTraditional();
                } else {
                    // Upload file immediately using fetch for modern browsers
                    uploadFile(file);
                }
            }
        }
        
        function sendMessageOrFile() {
            // Files are uploaded immediately on selection, so just allow normal form submission for text messages
            return true;
        }
        
        function uploadFileTraditional() {
            // Traditional form submission for older browsers (3DS, etc.)
            var uploadForm = document.getElementById('uploadFileForm');
            if (uploadForm) {
                // Show uploading indicator
                var messageInput = document.getElementById('message');
                if (messageInput) {
                    messageInput.disabled = true;
                    messageInput.value = 'Uploading file...';
                }
                uploadForm.submit();
            }
        }
        
        function uploadFile(file) {
            var formData = new FormData();
            formData.append('file', file);
            formData.append('channel', document.getElementById('channel').value);
            formData.append('message', ''); // No message content, just the file URL
            
            // Show uploading indicator
            var messageInput = document.getElementById('message');
            var originalValue = messageInput ? messageInput.value : '';
            if (messageInput) {
                messageInput.disabled = true;
                messageInput.value = 'Uploading ' + file.name + '...';
            }
            
            fetch('/uploadFile', {
                method: 'POST',
                body: formData
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.success) {
                    // Clear message box before refreshing
                    if (messageInput) {
                        messageInput.value = '';
                    }
                    // Refresh page when upload is done
                    window.location.reload();
                } else {
                    alert('Upload failed: ' + (data.error || 'Unknown error'));
                    if (messageInput) {
                        messageInput.value = originalValue;
                        messageInput.disabled = false;
                    }
                }
            })
            .catch(function(error) {
                alert('Upload failed: ' + error);
                if (messageInput) {
                    messageInput.value = originalValue;
                    messageInput.disabled = false;
                }
            })
            .finally(function() {
                document.getElementById('fileUpload').value = '';
                selectedFile = null;
            });
        }
        
        // Theme-aware hover color helper
        function getHoverColor() {
            if (document.body.classList.contains('light-theme')) {
                return 'rgba(0, 0, 0, 0.08)';
            } else if (document.body.classList.contains('amoled-theme')) {
                return 'rgba(255, 255, 255, 0.08)';
            } else {
                return 'rgba(255, 255, 255, 0.06)';
            }
        }
        
        function setHoverBg(el) {
            el.style.background = getHoverColor();
        }
        
        function clearBg(el) {
            el.style.background = 'none';
        }
    </script>
    <link rel="stylesheet" href="/css/main.css">
</head>

<body {$WHITE_THEME_ENABLED}>

        <a href="../server/{$SERVER_ID}" class="menu-button">

        </a>

        <div style="padding-left: 60px; height: 100vh; display: flex; flex-direction: column;">

                    {$MESSAGES}
                </div>

                <a id="end" name="end"></a>
            </div>
            
            <div id="replying_to">

                    <a href="./" style="color: #ed4245; margin-left: 8px; font-size: 12px;">Cancel</a>
                </div>
                <div style="color: #dcddde; font-size: 14px;">
                    {$REPLY_MESSAGE_CONTENT}
                </div>
            </div>

            <div class="message-form-container">
                <div id="emoji" style="display: none;">
                    <table cellpadding="0" cellspacing="0" width="100%">
                        <tr>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :sob:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f62d.gif" alt="sob" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :face_with_raised_eyebrow:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f928.gif" alt="face_with_raised_eyebrow" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :skull:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f480.gif" alt="skull" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :pleading_face:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f97a.gif" alt="pleading_face" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :heart:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/2764-fe0f.gif" alt="heart" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        </tr>
                        <tr>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :thumbsup:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f44d.gif" alt="thumbsup" width="24" height="24" style="width: 24px; height: 24px;"></a></td>

                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :pray:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f64f.gif" alt="pray" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                            <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="document.getElementById('message').value += ' :tada:'" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f389.gif" alt="tada" width="24" height="24" style="width: 24px; height: 24px;"></a></td>

                        </tr>
                    </table>
                </div>
                <form action="../../send" method="GET" onsubmit="return sendMessageOrFile()" style="position: relative;">
                    <div>
                        <a href="javascript:void(0)" onclick="showEmoji()" class="message-action-btn">
                            <img src="/resources/twemoji/{$RANDOM_EMOJI}.gif" alt="Add emoji" width="24" height="24"
                                style="width: 24px; height: 24px;">
                        </a>
                        <a href="javascript:void(0)" onclick="document.getElementById('fileUpload').click()" class="message-action-btn">
                            <img src="/resources/twemoji/1f4e4.gif" alt="Upload file" width="24" height="24"
                                style="width: 24px; height: 24px;">
                        </a>
                        <input type="file" id="fileUpload" style="display:none;" onchange="handleFileSelect(this)">
                        <a href="/draw/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f58c-fe0f.gif" alt="Draw" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="{$REFRESH_URL}" class="message-action-btn">

                    </div>
                    <input type="hidden" id="channel" name="channel" value="{$CHANNEL_ID}">
                    <input type="hidden" name="sessionID" value="{$SESSION_ID}">
                    <input type="hidden" id="lite" name="lite" value="False">
                    <input type="hidden" name="reply_message_id" value="{$REPLY_MESSAGE_ID}">
                    {$INPUT}
                </form>
                
                <!-- Hidden form for traditional file upload (for older browsers like 3DS) -->
                <form id="uploadFileForm" action="/uploadFile?traditional=true" method="POST" enctype="multipart/form-data" style="display:none;">
                    <input type="hidden" name="channel" id="channelUpload" value="{$CHANNEL_ID}">
                    <input type="hidden" name="message" value="">
                </form>
            </div>
        </div>
    </div>
</body>
