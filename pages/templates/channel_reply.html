<!DOCTYPE html>
<html class="page-channel-reply">

<head>
    {$COMMON_HEAD}
    <title>Discross - {$CHANNEL_NAME}</title>
    <script src="/js/channel.js"></script>
</head>

<body {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
        <a href="../server/{$SERVER_ID}" class="menu-button">
            <img src="/resources/images/menu.gif" alt="Menu" width="24" height="24" style="width: 24px; height: 24px;">
        </a>

        <!-- Main content area with padding at bottom for message input -->
        <div style="padding-left: 60px; padding-bottom: 190px;"> <!-- Extra padding keeps last messages above fixed reply bar -->
            <div style="padding: 16px;">
                <div id="msgcontainer">
                    {$MESSAGES}
                </div>
            </div>
        </div>
        
        <div class="message-form-container">
            <div id="replying_to">
                <div class="reply-label">
                    <strong>Replying to {$REPLY_MESSAGE_AUTHOR}</strong>
                    <a href="./" class="reply-cancel">Cancel</a>
                </div>
                <div class="reply-content-preview">
                    {$REPLY_MESSAGE_CONTENT}
                </div>
            </div>
            <div id="emoji" style="display: none;">
                <table cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':sob:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f62d.gif" alt="sob" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':face_with_raised_eyebrow:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f928.gif" alt="face_with_raised_eyebrow" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':skull:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f480.gif" alt="skull" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':pleading_face:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f97a.gif" alt="pleading_face" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':heart:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/2764-fe0f.gif" alt="heart" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                    </tr>
                    <tr>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':thumbsup:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f44d.gif" alt="thumbsup" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':thumbsdown:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f44e.gif" alt="thumbsdown" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':pray:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f64f.gif" alt="pray" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':tada:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f389.gif" alt="tada" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                        <td width="20%" align="center" style="padding:4px"><a href="javascript:void(0)" onclick="insertEmoji(':slight_smile:')" style="display:inline-block;background:none;cursor:pointer;padding:8px;border-radius:4px;text-decoration:none" onmouseover="setHoverBg(this)" onmouseout="clearBg(this)"><img src="/resources/twemoji/1f642.gif" alt="slight_smile" width="24" height="24" style="width: 24px; height: 24px;"></a></td>
                    </tr>
                </table>
            </div>
            
            <form action="../../send" method="GET" onsubmit="return sendMessageOrFile()" style="position: relative;">
                <div>
                    <a href="javascript:void(0)" onclick="showEmoji()" class="message-action-btn">
                        <img src="/resources/twemoji/{$RANDOM_EMOJI}.gif" alt="Add emoji" width="24" height="24"
                            style="width: 24px; height: 24px;">
                    </a>
                    <button type="button" onclick="openFileUpload()" class="message-action-btn">
                        <img src="/resources/twemoji/1f4e4.gif" alt="Upload file" width="24" height="24"
                            style="width: 24px; height: 24px;">
                    </button>
                    <a href="/draw/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn">
                        <img src="/resources/twemoji/1f58c-fe0f.gif" alt="Draw" width="24" height="24" style="width: 24px; height: 24px;">
                    </a>
                    <a href="/food/{$SESSION_PARAM}" class="message-action-btn">
                        <img src="/resources/twemoji/1f355.gif" alt="Order Pizza" width="24" height="24" style="width: 24px; height: 24px;">
                    </a>
                    <a href="/pins/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn">
                        <img src="/resources/twemoji/1f4cc.gif" alt="Pins" width="24" height="24" style="width: 24px; height: 24px;">
                    </a>
                    <a href="{$REFRESH_URL}" class="message-action-btn">
                        <img src="/resources/images/refresh.gif" alt="Refresh" width="24" height="24" style="width: 24px; height: 24px;">
                    </a>
                </div>
                <input type="hidden" id="channel" name="channel" value="{$CHANNEL_ID}">
                <input type="hidden" id="sessionID" name="sessionID" value="{$SESSION_ID}">
                <input type="hidden" id="lite" name="lite" value="False">
                <input type="hidden" name="reply_message_id" value="{$REPLY_MESSAGE_ID}">
                {$INPUT}
            </form>
            
            <!-- Standalone hidden file input for AJAX upload (modern browsers) -->
            <input type="file" id="fileUpload" style="display:none;" aria-label="Upload file" onchange="handleFileSelect(this)">
        </div>
        <a id="end" name="end"></a>
    </div>
</body>

</html>
