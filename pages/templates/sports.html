<!doctype html>
<html class="page-simple">
  <head>
    {$COMMON_HEAD}
    
    <script>
      try {
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (tz) {
          var date = new Date();
          date.setTime(date.getTime() + (7 * 24 * 60 * 60 * 1000));
          document.cookie = 'userTZ=' + encodeURIComponent(tz) + '; path=/; expires=' + date.toUTCString();
        }
      } catch (e) {}
    </script>
  </head>

  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">

            <a href="/server/"><img src="/resources/logo.gif" alt="Logo" width="64" height="64" /></a>
          </td>
          <td>
            <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
          </td>
          <td width="100%" align="right">
            <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">{$MENU_OPTIONS}</font>
          </td>
          <td valign="middle" style="padding-left: 8px; padding-right: 8px;">
            <a href="/switchtheme"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none" /></a>
          </td>
        </tr>
      </table>
      <hr style="margin: 4px 0" />
      <div style="padding: 16px">
        <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
          <b><font size="5">Sports Scores</font></b>
          <br /><br />
          {$NAV_BUTTONS} {$SPORTS_CONTENT}
          <br /><br />

            <a href="https://www.espn.com/" style="color: #5865f2">ESPN</a></font>
        </font>

  </body>
</html>
