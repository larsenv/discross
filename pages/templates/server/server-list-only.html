<button id="add-passkey" class="discross-button" style="padding-top: 8px; padding-bottom: 8px;">Add Passkey</button>
<span id="passkey-status" style="font-size: 0.8em; color: #aaaaaa; margin-left: 8px;"></span>

<script>
  (function() {
      var btn = document.getElementById('add-passkey');
      var status = document.getElementById('passkey-status');
      if (!btn) return;

      btn.onclick = function() {
          // Check for secure context first (required for WebAuthn/Passkeys)
          if (window.isSecureContext === false) {
                  alert("Passkey authentication requires a secure context (HTTPS). Please ensure you are accessing Discross via HTTPS.");
                  return;
          }

          // Check for WebAuthn support
          // Use a more robust check that looks for the create function
          if (!window.PublicKeyCredential || typeof navigator.credentials === 'undefined' || typeof navigator.credentials.create !== 'function') {
                  btn.disabled = true;
                  btn.style.cursor = 'not-allowed';
                  btn.style.opacity = '0.6';
                  // Updated message to be slightly more general, as browser support is complex
                  status.innerText = "Passkey authentication is not available on this device or browser.";
                  alert("Passkey authentication is not available on this device or browser.");
                  return;
          }
          status.innerText = "Checking availability...";

          PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
              .then(function(available) {
                  if (!available) {
                      alert("Passkey authentication is not available on this device.");
                      status.innerText = "";
                      return;
                  }

                  status.innerText = "Registering passkey... Follow your browser's prompts.";

                  var challenge = new Uint8Array(32);
                  window.crypto.getRandomValues(challenge);

                  var userID = "{$USER_ID}";
                  var publicKeyCredentialCreationOptions = {
                      challenge: challenge,
                      rp: {
                          name: "Discross",
                          id: window.location.hostname
                      },
                      user: {
                          id: new TextEncoder().encode(userID),
                          name: "{$USER_NAME}",
                          displayName: "{$USER_NAME}"
                      },
                      pubKeyCredParams: [{alg: -7, type: "public-key"}, {alg: -257, type: "public-key"}],
                      authenticatorSelection: {
                          authenticatorAttachment: "platform",
                          userVerification: "preferred"
                      },
                      timeout: 60000,
                      attestation: "direct"
                  };

                  return navigator.credentials.create({
                      publicKey: publicKeyCredentialCreationOptions
                  });
              })
              .then(function(credential) {
                  if (credential) {
                      alert("Passkey registered successfully! (Note: Full server-side verification not yet implemented in this preview)");
                      status.innerText = "Passkey added.";
                  }
              })
              .catch(function(err) {
                  console.error(err);
                  if (err.name !== 'NotAllowedError') {
                      alert("Error creating passkey: " + err.message);
                  }
                  status.innerText = "";
              });
      };
  })();
</script>
