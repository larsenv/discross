<font face="'rodin', Arial, Helvetica, sans-serif" class="server-select-text">
  <font size="5"><b>Select a Server</b></font>
  <br /><br />
  <font size="4">Choose a server from the list on the left to view channels.</font>
  <br /><br />
</font>
<a class="discross-button" style="width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;" href="/">Home</a>
<br />
<a class="discross-button" style="width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;" href="https://discord.com/oauth2/authorize?client_id={$DISCORD_CLIENT_ID}&response_type=code&redirect_uri={$DISCORD_REDIRECT_URL_ENCODED}&scope=identify+guilds&prompt=none">Update Server List</a>
<br />
<a class="discross-button" style="width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;" href="https://discordapp.com/oauth2/authorize?client_id={$DISCORD_CLIENT_ID}&scope=bot&permissions=536870912">Add Discross to your server</a>
<br />
<a class="discross-button" style="width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;" href="/changepassword.html{$SESSION_PARAM}">Change Password</a>
<br />
<a class="discross-button" style="width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;" href="/setup2fa.html{$SESSION_PARAM}">Manage 2FA</a>
<br />
<button id="add-passkey" class="discross-button" style="padding-top: 8px; padding-bottom: 8px; width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;">Add Passkey</button>
<br />
{$IMAGES_WARNING}
<br />
<a class="discross-button" style="width: 100%; max-width: 280px; text-align: center; box-sizing: border-box;" href="/switchtheme{$SESSION_PARAM}">Switch Theme</a>

<script>
  (function() {
      var btn = document.getElementById('add-passkey');
      if (!btn) return;

      btn.onclick = function() {
          if (window.isSecureContext === false) {
                  alert("Passkey authentication requires a secure context (HTTPS). Please ensure you are accessing Discross via HTTPS.");
                  return;
          }

          if (!window.PublicKeyCredential || typeof navigator.credentials === 'undefined' || typeof navigator.credentials.create !== 'function') {
                  btn.disabled = true;
                  btn.style.cursor = 'not-allowed';
                  btn.style.opacity = '0.6';
                  alert("Passkey authentication is not available on this device or browser.");
                  return;
          }

          PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
              .then(function(available) {
                  if (!available) {
                      alert("Passkey authentication is not available on this device.");
                      return;
                  }

                  return fetch('/passkey/options');
              })
              .then(function(response) {
                  return response.json().catch(function() {
                      // Non-JSON body (e.g. an HTML error page): surface the
                      // status instead of a cryptic "unexpected character" parse
                      // error from farther down the chain.
                      throw new Error("Server returned an unexpected response (" + response.status + ").");
                  });
              })
              .then(function(options) {
                  console.log("Registering passkey with options:", options);
                  // A JSON error object from the server has no challenge/user, so
                  // report its message rather than crashing on options.user.id.
                  if (!options || options.error || !options.challenge || !options.user) {
                      throw new Error((options && options.error) || "Could not start passkey registration.");
                  }
                  options.challenge = new window.Uint8Array(options.challenge);
                  options.user.id = new window.Uint8Array(options.user.id);

                  return navigator.credentials.create({
                      publicKey: options
                  });
              })
              .then(function(credential) {
                  if (credential) {
                      const response = credential.response;
                      const data = {
                          id: credential.id,
                          rawId: btoa(String.fromCharCode.apply(null, new window.Uint8Array(credential.rawId))),
                          clientDataJSON: btoa(String.fromCharCode.apply(null, new window.Uint8Array(response.clientDataJSON))),
                          attestationObject: btoa(String.fromCharCode.apply(null, new window.Uint8Array(response.attestationObject)))
                      };
                      return fetch('/passkey/verify', {
                          method: 'POST',
                          body: JSON.stringify(data),
                          headers: { 'Content-Type': 'application/json' }
                      });
                  }
              })
              .then(function(response) {
                  if (response && response.ok) {
                      alert("Passkey registered successfully!");
                  } else {
                      throw new Error("Verification failed");
                  }
              })
              .catch(function(err) {
                  var errName = err ? (err.name || 'UnknownError') : 'NullError';
                  var errMessage = err ? (err.message || 'No message') : 'No error details';

                  if (errName !== 'NotAllowedError') {
                      alert("Error creating passkey: " + errName + " - " + errMessage);
                  }
              });
      };
  })();
</script>
