<!DOCTYPE html>
<html class="page-news">

<head>
    {$COMMON_HEAD}
    <title>Discross - AP News - {$TAG_DISPLAY}</title>
</head>

<body {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
        <div style="padding: 16px;">
            <b><font size="5" face="'rodin', Arial, Helvetica, sans-serif">AP News - {$TAG_DISPLAY}</font></b><br>
            <form method="get" action="/news" class="news-search-form">
                {$SESSION_HIDDEN}
                <input type="text" name="tag" placeholder="Category tag (e.g. sports)" value="{$TAG_VALUE}" class="news-search-input">
                <input type="submit" value="Go" class="discross-button news-search-btn">
            </form>
            <div id="news-feed">
                {$NEWS_ITEMS}
            </div>
            <p class="news-attribution">News content is provided by <a href="http://apnews.com/" target="_blank" rel="noopener noreferrer"> Associated Press</a></p>
        </div>
    </div>
</body>

</html>
