<!doctype html>
<html lang="en" class="page-simple">
  <head>
    {$COMMON_HEAD}
    
  </head>

  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
      <table style="width: 100%">
        <tr valign="middle">
          <td>
            <a href="/"><img src="/resources/logo.gif" alt="Logo" width="64" height="64" /></a>
          </td>
          <td>
            <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
          </td>
          <td width="100%" align="right">
            <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160;</font>
          </td>
          <td valign="middle" style="padding-right: 8px;">
            <a href="/switchtheme"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none" /></a>
          </td>
        </tr>
      </table>
      <hr style="margin: 0" />
      <br />
      <table>
        <tr>
          <td>&nbsp;&nbsp;&nbsp;&nbsp;</td>
          <td>
            <form action="/guest_name" method="GET">
              <h1 style="font-size: 24px; font-weight: bold; font-family: 'rodin', Arial, Helvetica, sans-serif; color: #dddddd; margin: 0 0 8px 0;">Guest Access</h1><br />
              <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
                Enter your name to chat as a guest:
                <br /><br />
                <div style="padding: 16px; background: #222327; width: 25%; min-width: 200px"><input type="text" name="name" id="name" value="{$GUEST_NAME}" style=" color: #dddddd; background: #222327; border: none; width: 100%; outline: none; " placeholder="Your name" maxlength="32" required /></div>
                <br />
                Anti-Spam Verification: {$CAPTCHA_QUESTION}
                <br /><br />
                <div style="padding: 16px; background: #222327; width: 25%; min-width: 200px"><input type="text" name="captcha" id="captcha" value="" style=" color: #dddddd; background: #222327; border: none; width: 100%; outline: none; " placeholder="Answer" maxlength="16" required /></div>
                <br />
                <input type="hidden" name="channel" value="{$CHANNEL_ID}" />
                <input type="hidden" name="captcha_token" value="{$CAPTCHA_TOKEN}" />
                {$ERROR}<br />
                <input type="submit" style=" color: #ffffff; height: 44px; width: 150px; border: none; background: #5865f2; border-radius: 8px; font-family: 'rodin', Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; " value="Enter" />
              </font>
            </form>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
