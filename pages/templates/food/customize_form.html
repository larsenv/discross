<div class="food-card"><form method="POST" action="{$ACTION_URL}">
  <input type="hidden" name="storeId" value="{$STORE_ID}">
  <input type="hidden" name="country" value="{$COUNTRY}">
  <input type="hidden" name="code" value="{$CODE}">
  <input type="hidden" name="name" value="{$NAME}">
  <input type="hidden" name="price" value="{$PRICE}">
  <input type="hidden" name="redirect" value="{$REDIRECT}">
  <input type="hidden" name="default_options" value="{$DEFAULT_OPTIONS}">
  <font face="'rodin', Arial, Helvetica, sans-serif" color="#aaaaaa"><i>Default toppings, sauce, and cheese are pre-selected below. Adjust as needed.</i></font><br><br>
  {$SAUCE_SECTION}
  {$TOPPING_SECTION}
  <div style="margin-top:16px">
    <table cellpadding="0" cellspacing="0">
      <tr>
        <td><button type="submit" class="food-btn food-btn-large">Add to Cart {$PRICE_TEXT}</button></td>
        <td style="padding-left:10px"><a href="{$CANCEL_URL}" class="food-btn food-btn-secondary">Cancel</a></td>
      </tr>
    </table>
  </div>
</form></div>
