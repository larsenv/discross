<!doctype html>
<html lang="en" class="page-food">
  <head>
    {$COMMON_HEAD}
    <title>Discross - Your Cart</title>
  </head>
  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
      <table style="width: 100%">
        <tr valign="middle">
          <td>
            <a href="/"><img src="/resources/logo.gif" alt="Logo" /></a>
          </td>
          <td>
            <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
          </td>
          <td width="100%" align="right">
            <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160;
              <a href="/food/{$SESSION_PARAM}" style="color: #dddddd">Order Pizza</a>&#160;&#160;
              <a href="/food/cart{$SESSION_PARAM}" style="color: #dddddd">Cart ({$CART_COUNT})</a>&#160;&#160;
              <a href="/food/receipts{$SESSION_PARAM}" style="color: #dddddd">Orders</a>&#160;&#160;
              <a href="/food/track{$SESSION_PARAM}" style="color: #dddddd">Track</a>&#160;&#160;
            </font>
          </td>
          <td valign="middle" style="padding-right: 8px;">
            <a href="/switchtheme{$SESSION_PARAM}"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none" /></a>
          </td>
        </tr>
      </table>
      <hr style="margin: 0" />
      <br />
      <div class="food-container">
        <font size="6" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd"><b>Your Cart</b></font><br /><br />
        <div class="food-card">
          <table class="food-cart-table">
            <thead>
              <tr>
                <th class="food-cart-th">Item</th>
                <th class="food-cart-th">Qty</th>
                <th class="food-cart-th">Price</th>
                <th class="food-cart-th"></th>
              </tr>
            </thead>
            <tbody>{$CART_ITEMS}</tbody>
            <tfoot>
              <tr>
                <td colspan="2" style=" padding: 12px 8px; font-weight: 600; color: #dddddd; font-family: 'rodin', Arial, Helvetica, sans-serif; ">Total</td>
                <td class="food-cart-price" style="font-weight: 600; color: #dddddd">
                  $<span id="cart-total">{$CART_TOTAL}</span>
                </td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div style="{$HAS_ITEMS}margin-top:16px">
          <a href="/food/checkout{$SESSION_PARAM}" class="food-btn food-btn-large">Proceed to Checkout &#8594;</a>
          &#160;&#160;
          <a href="/food/menu?store={$STORE_ID}{$SESSION_ID_SUFFIX}" class="food-btn food-btn-secondary">Continue Shopping</a>
        </div>
      </div>
    </div>
  </body>
</html>
