<!DOCTYPE html>
<html class="page-simple">
<head>
  {$COMMON_HEAD}
  <title>Discross - Store Search Results</title>
</head>
<body style="margin: 0;" {$WHITE_THEME_ENABLED}>
  <div id="wrapper">
    <table style="width: 100%;">
      <tr valign="middle">
        <td><a href="/"><img src="/resources/logo.gif" alt="Logo"></a></td>
        <td>
          <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
        </td>
        <td width="100%" align="right">
          <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160;
            <a href="/food/cart" style="color:#dddddd">Cart ({$CART_COUNT})</a>&#160;&#160;
            <a href="/food/receipts" style="color:#dddddd">Orders</a>&#160;&#160;
            <a href="/food/track" style="color:#dddddd">Track Order</a>
          </font>
        </td>
        <td valign="middle">
          <a href="/switchtheme"><img src="/resources/images/themeswitch.gif" alt="Switch theme" style="background: none; border: none;"></a>
        </td>
      </tr>
    </table>
    <hr style="margin: 0;">
    <br>
    <div class="food-container">
      <div class="food-back-row">
        <a href="/food/" class="food-back-link">&#8592; Back</a>
      </div>
      <div class="food-card">
        <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd"><b>Find a Store</b></font><br><br>
        <form method="GET" action="/food/store-search">
          <div class="food-input-row">
            <input type="text" name="address" class="food-input" value="{$SEARCH_ADDRESS}" placeholder="Delivery address or zip code" required>
            <button type="submit" class="food-btn">Find Stores</button>
          </div>
        </form>
      </div>
      {$STORE_RESULTS}
    </div>
  </div>
</body>
</html>
