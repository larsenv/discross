    <style>
        /* Force block layout on Wii (Opera 9 does not support flexbox) */
        html, html.page-draw,
        body, html.page-draw body,
        #wrapper, html.page-draw #wrapper {
            display: block !important;
            height: auto !important;
            min-height: 0 !important;
            overflow: visible !important;
            flex: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        #toolbar-container {
            background-color: #2f3136 !important;
            padding: 5px !important;
            border-bottom: 1px solid #202225 !important;
            display: table !important;
            margin: 0 auto 5px auto !important;
            border-radius: 8px !important;
            text-align: left !important;
            position: relative !important;
            transform: none !important;
            left: auto !important;
            right: auto !important;
            bottom: auto !important;
            top: auto !important;
            width: auto !important;
            max-width: none !important;
            z-index: 10 !important;
        }

        .c-box {
            width: 24px !important;
            height: 24px !important;
            border: 2px solid #555 !important;
            display: inline-block !important;
            margin: 1px !important;
            cursor: pointer !important;
            vertical-align: middle !important;
        }

        .s-btn {
            background: #b9bbbe !important;
            border: 2px solid #000 !important;
            display: inline-block !important;
            margin: 0 3px !important;
            cursor: pointer !important;
            vertical-align: middle !important;
            padding: 2px !important;
        }

        .s-inner { background: black !important; font-size: 1px !important; }

        #canvas-wrapper {
            margin: 0 auto 20px auto !important;
            display: block !important;
            background: #2f3136 !important;
            padding: 5px !important;
            width: 610px !important;
            max-width: 100% !important;
            position: relative !important;
            z-index: 10 !important;
            box-sizing: border-box !important;
        }

        canvas {
            background: #ffffff !important;
            cursor: crosshair !important;
            display: block !important;
            border: 1px solid #202225 !important;
            max-width: 100% !important;
            margin: 0 auto !important;
        }

        /* Wii button styling */
        #toolbar-container input[type="button"], .clear-button {
            padding: 4px 8px !important;
            margin: 2px !important;
            cursor: pointer !important;
            vertical-align: middle !important;
            font-size: 14px !important;
            border-radius: 4px !important;
        }

        .content-padding {
            padding-left: 0 !important;
            padding-right: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 120px !important;
            display: block !important;
            background: transparent !important;
        }

        .message-form-container {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            background: #36393f !important;
            border-top: 1px solid #202225 !important;
            padding: 8px !important;
            box-sizing: border-box !important;
            z-index: 50 !important;
        }

        /* Override menu button from main.css on Wii */
        .menu-button {
            position: fixed !important;
            top: 12px !important;
            bottom: auto !important;
            left: 12px !important;
            right: auto !important;
            z-index: 100 !important;
            background: #2f3136 !important;
            border: 1px solid #202225 !important;
            border-radius: 6px !important;
            padding: 6px !important;
            display: block !important;
            width: auto !important;
            height: auto !important;
            text-decoration: none !important;
        }
        .menu-icon { width: 24px !important; height: 24px !important; display: block !important; }
    </style>
</head>

    <script>
        var canvas = document.getElementById('sketchpad');
        var ctx = canvas.getContext('2d');

        var isDrawing = false;
        var lastX = 0;
        var lastY = 0;
        var currColor = '#000000';
        var currSize = 5;
        var currTool = 'draw';

        // History for undo
        var historyStack = [];
        var maxHistory = 20;

        function saveHistory() {
            try {
                if (historyStack.length >= maxHistory) {
                    historyStack.shift();
                }
                historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            } catch (ex) {}
        }

        function undo() {
            if (historyStack.length > 0) {
                ctx.putImageData(historyStack.pop(), 0, 0);
            }
        }

        // Defaults
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = currSize;
        ctx.strokeStyle = currColor;
        // Fill canvas with white immediately
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = currColor;

        // --- COORDINATE SYSTEM ---
        function getPos(e) {
            if (e.offsetX !== undefined) {
                return { x: e.offsetX, y: e.offsetY };
            } else if (e.layerX !== undefined) {
                return { x: e.layerX, y: e.layerY };
            } else {
                var rect = canvas.getBoundingClientRect();
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            }
        }

        // --- DRAWING EVENTS ---
        canvas.onmousedown = function(e) {
            e = e || window.event;
            if (e && e.preventDefault) e.preventDefault(); // Stop Wii Drag
            isDrawing = true;
            var pos = getPos(e);

            if (currTool === 'fill') {
                saveHistory();
                floodFill(pos.x, pos.y);
                return false;
            }

            saveHistory();
            lastX = pos.x;
            lastY = pos.y;

            ctx.beginPath();
            ctx.arc(lastX, lastY, currSize/2, 0, Math.PI*2, false);
            ctx.fillStyle = currTool === 'eraser' ? '#ffffff' : currColor;
            ctx.fill();
            ctx.beginPath();

            return false;
        };

        canvas.onmousemove = function(e) {
            if (!isDrawing) return;
            e = e || window.event;
            if (e && e.preventDefault) e.preventDefault();

            var pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = currTool === 'eraser' ? '#ffffff' : currColor;
            ctx.stroke();

            lastX = pos.x;
            lastY = pos.y;
        };

        canvas.onmouseup = function() { isDrawing = false; };
        canvas.onmouseout = function() { isDrawing = false; };

        // --- UI FUNCTIONS ---
        function setColor(col, id) {
            currColor = col;
            if (currTool === 'eraser') {
                setTool('draw'); // Switch back to draw mode when a color is picked
            }
            ctx.strokeStyle = currColor;
            ctx.fillStyle = currColor;

            for(var i=1; i<=16; i++) {
                var el = document.getElementById('c'+i);
                if(el) {
                    el.style.border = "2px solid #555";
                    el.style.borderColor = "#555";
                }
            }
            var target = document.getElementById(id);
            if (target) {
                target.style.border = "2px solid white";
                target.style.borderColor = "white";
            }
        }

        function setTool(tool) {
            currTool = tool;
            var drawBtn = document.getElementById('btn-draw');
            var fillBtn = document.getElementById('btn-fill');
            var eraserBtn = document.getElementById('btn-eraser');

            if (drawBtn) {
                drawBtn.style.border = currTool === 'draw' ? '2px solid #ffffff' : '1px solid #555';
                drawBtn.style.borderColor = currTool === 'draw' ? '#ffffff' : '#555';
                drawBtn.style.background = currTool === 'draw' ? '#5865f2' : '';
                drawBtn.style.color = currTool === 'draw' ? '#ffffff' : '';
            }
            if (fillBtn) {
                fillBtn.style.border = currTool === 'fill' ? '2px solid #ffffff' : '1px solid #555';
                fillBtn.style.borderColor = currTool === 'fill' ? '#ffffff' : '#555';
                fillBtn.style.background = currTool === 'fill' ? '#5865f2' : '';
                fillBtn.style.color = currTool === 'fill' ? '#ffffff' : '';
            }
            if (eraserBtn) {
                eraserBtn.style.border = currTool === 'eraser' ? '2px solid #ffffff' : '1px solid #555';
                eraserBtn.style.borderColor = currTool === 'eraser' ? '#ffffff' : '#555';
                eraserBtn.style.background = currTool === 'eraser' ? '#5865f2' : '';
                eraserBtn.style.color = currTool === 'eraser' ? '#ffffff' : '';
            }

            if (currTool === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.fillStyle = '#ffffff';
            } else {
                ctx.strokeStyle = currColor;
                ctx.fillStyle = currColor;
            }
        }

        function floodFill(startX, startY) {
            startX = Math.round(startX);
            startY = Math.round(startY);
            if (startX < 0 || startX >= canvas.width || startY < 0 || startY >= canvas.height) return;

            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            var w = canvas.width;
            var h = canvas.height;

            var fillR = parseInt(currColor.slice(1, 3), 16);
            var fillG = parseInt(currColor.slice(3, 5), 16);
            var fillB = parseInt(currColor.slice(5, 7), 16);

            var idx = (startY * w + startX) * 4;
            var targetR = data[idx];
            var targetG = data[idx + 1];
            var targetB = data[idx + 2];
            var targetA = data[idx + 3];

            if (targetR === fillR && targetG === fillG && targetB === fillB && targetA === 255) return;

            var tolSq = 130000;
            var visited = [];
            var stack = [startX + startY * w];
            while (stack.length > 0) {
                var pos = stack.pop();
                if (visited[pos]) continue;
                visited[pos] = 1;
                var x = pos % w;
                var y = (pos - x) / w;
                var i = pos * 4;
                var dr = data[i] - targetR;
                var dg = data[i + 1] - targetG;
                var db = data[i + 2] - targetB;
                var da = data[i + 3] - targetA;
                if (dr * dr + dg * dg + db * db + da * da > tolSq) continue;
                data[i] = fillR;
                data[i + 1] = fillG;
                data[i + 2] = fillB;
                data[i + 3] = 255;
                if (x > 0) stack.push(pos - 1);
                if (x < w - 1) stack.push(pos + 1);
                if (y > 0) stack.push(pos - w);
                if (y < h - 1) stack.push(pos + w);
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function setSize(s, id) {
            currSize = s;
            ctx.lineWidth = currSize;

            for(var i=1; i<=4; i++) {
                var el = document.getElementById('s'+i);
                if(el) {
                    el.style.border = "2px solid #000";
                    el.style.borderColor = "#000";
                    el.style.background = "#b9bbbe";
                }
            }
            var target = document.getElementById(id);
            if (target) {
                target.style.border = "2px solid blue";
                target.style.borderColor = "blue";
                target.style.background = "#00b0f4";
            }
        }

        function wipe() {
            saveHistory();
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = currColor;
        }

        // --- SEND LOGIC ---
        // Wii support: do not use toDataURL synchronously in submission if performance bottleneck.
        function prepareAndSend() {
            var inputField = document.getElementById('drawinginput');
            var form = document.getElementById('sendform');
            var data = canvas.toDataURL("image/png");
            inputField.value = data;
            form.submit();
        }

        function handleMessageKeydown(event) {
            var keyCode = event.keyCode || event.which;
            if (keyCode === 13 && !event.shiftKey) {
                event.preventDefault();
                prepareAndSend();
                return false;
            }
        }

        function autoResize(el) {
            if (!el) return;
            var currentLen = el.value.length;
            var lastLen = parseInt(el.getAttribute('data-last-len') || '0');
            el.setAttribute('data-last-len', currentLen);
            if (currentLen > lastLen) {
                if (el.scrollHeight > el.offsetHeight && el.offsetHeight < 200) {
                    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
                }
            } else {
                el.style.height = 'auto';
                var newHeight = el.scrollHeight;
                if (newHeight < 40) newHeight = 40;
                if (newHeight > 200) newHeight = 200;
                el.style.height = newHeight + 'px';
            }
        }

        // Initialize UI
        setColor('#000000', 'c1');
        setSize(5, 's2');
        setTool('draw');
    </script>
</body>
