<!DOCTYPE html>
<html lang="en" class="page-draw">
<head>
    {$COMMON_HEAD}
    <title>Draw in #{$CHANNEL_NAME} - Discross</title>
    <style>
        /* Force block layout on Wii (Opera 9 does not support flexbox) */
        html, html.page-draw,
        body, html.page-draw body,
        #wrapper, html.page-draw #wrapper {
            display: block !important;
            height: auto !important;
            min-height: 0 !important;
            overflow: visible !important;
            flex: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        #toolbar-container {
            background-color: #2f3136 !important;
            padding: 5px !important;
            border-bottom: 1px solid #202225 !important;
            display: table !important;
            margin: 0 auto 5px auto !important;
            border-radius: 8px !important;
            text-align: left !important;
            position: relative !important;
            transform: none !important;
            left: auto !important;
            right: auto !important;
            bottom: auto !important;
            top: auto !important;
            width: auto !important;
            max-width: none !important;
            z-index: 10 !important;
        }

        .c-box {
            width: 24px !important;
            height: 24px !important;
            border: 2px solid #555 !important;
            display: inline-block !important;
            margin: 1px !important;
            cursor: pointer !important;
            vertical-align: middle !important;
        }

        .s-btn {
            background: #b9bbbe !important;
            border: 2px solid #000 !important;
            display: inline-block !important;
            margin: 0 3px !important;
            cursor: pointer !important;
            vertical-align: middle !important;
            padding: 2px !important;
        }

        .s-inner { background: black !important; font-size: 1px !important; }

        #canvas-wrapper {
            margin: 0 auto 20px auto !important;
            display: block !important;
            background: #2f3136 !important;
            padding: 5px !important;
            width: 610px !important;
            max-width: 100% !important;
            position: relative !important;
            z-index: 10 !important;
            box-sizing: border-box !important;
        }

        canvas {
            background: #ffffff !important;
            cursor: crosshair !important;
            display: block !important;
            border: 1px solid #202225 !important;
            max-width: 100% !important;
            margin: 0 auto !important;
        }

        /* Wii button styling */
        #toolbar-container input[type="button"], .clear-button {
            padding: 4px 8px !important;
            margin: 2px !important;
            cursor: pointer !important;
            vertical-align: middle !important;
            font-size: 14px !important;
            border-radius: 4px !important;
        }

        .content-padding {
            padding-left: 0 !important;
            padding-right: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 120px !important;
            display: block !important;
            background: transparent !important;
        }

        .message-form-container {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            background: #36393f !important;
            border-top: 1px solid #202225 !important;
            padding: 8px !important;
            box-sizing: border-box !important;
            z-index: 50 !important;
        }

        /* Override menu button from main.css on Wii */
        .menu-button {
            position: fixed !important;
            top: 12px !important;
            bottom: auto !important;
            left: 12px !important;
            right: auto !important;
            z-index: 100 !important;
            background: #2f3136 !important;
            border: 1px solid #202225 !important;
            border-radius: 6px !important;
            padding: 6px !important;
            display: block !important;
            width: auto !important;
            height: auto !important;
            text-decoration: none !important;
        }
        .menu-icon { width: 24px !important; height: 24px !important; display: block !important; }
    </style>
</head>

<body {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
        <div id="toolbar-container">
            <div id="c1" class="c-box" style="background:#000000;" onclick="setColor('#000000', 'c1')"></div><!--
            --><div id="c2" class="c-box" style="background:#555555;" onclick="setColor('#555555', 'c2')"></div><!--
            --><div id="c3" class="c-box" style="background:#aaaaaa;" onclick="setColor('#aaaaaa', 'c3')"></div><!--
            --><div id="c4" class="c-box" style="background:#ffffff;" onclick="setColor('#ffffff', 'c4')"></div><!--
            --><div id="c5" class="c-box" style="background:#800000;" onclick="setColor('#800000', 'c5')"></div><!--
            --><div id="c6" class="c-box" style="background:#ff0000;" onclick="setColor('#ff0000', 'c6')"></div><!--
            --><div id="c7" class="c-box" style="background:#ff9900;" onclick="setColor('#ff9900', 'c7')"></div><!--
            --><div id="c8" class="c-box" style="background:#ffff00;" onclick="setColor('#ffff00', 'c8')"></div><!--
            --><div id="c9" class="c-box" style="background:#800080;" onclick="setColor('#800080', 'c9')"></div><!--
            --><div id="c10" class="c-box" style="background:#004d00;" onclick="setColor('#004d00', 'c10')"></div><!--
            --><div id="c11" class="c-box" style="background:#00ff00;" onclick="setColor('#00ff00', 'c11')"></div><!--
            --><div id="c12" class="c-box" style="background:#000080;" onclick="setColor('#000080', 'c12')"></div><!--
            --><div id="c13" class="c-box" style="background:#00ffff;" onclick="setColor('#00ffff', 'c13')"></div><!--
            --><div id="c14" class="c-box" style="background:#ff69b4;" onclick="setColor('#ff69b4', 'c14')"></div><!--
            --><div id="c15" class="c-box" style="background:#ff00ff;" onclick="setColor('#ff00ff', 'c15')"></div><!--
            --><div id="c16" class="c-box" style="background:#8b4513;" onclick="setColor('#8b4513', 'c16')"></div><!--
            --><div id="s1" class="s-btn" onclick="setSize(2, 's1')"><div class="s-inner" style="width:2px; height:2px;"></div></div><!--
            --><div id="s2" class="s-btn" onclick="setSize(5, 's2')"><div class="s-inner" style="width:5px; height:5px;"></div></div><!--
            --><div id="s3" class="s-btn" onclick="setSize(10, 's3')"><div class="s-inner" style="width:10px; height:10px;"></div></div><!--
            --><div id="s4" class="s-btn" onclick="setSize(20, 's4')"><div class="s-inner" style="width:20px; height:20px;"></div></div><!--
            --><input type="button" id="btn-draw" onclick="setTool('draw')" value="Draw"><!--
            --><input type="button" id="btn-fill" onclick="setTool('fill')" value="Fill"><!--
            --><input type="button" id="btn-undo" onclick="undo()" value="Undo"><!--
            --><input type="button" id="btn-eraser" onclick="setTool('eraser')" value="Erase"><!--
            --><input type="button" id="btn-clear" class="clear-button" onclick="wipe()" value="Clear">
        </div>

        <div id="canvas-wrapper">
            <canvas id="sketchpad" width="600" height="350"></canvas>
            <div style="margin-top: 6px; text-align: center;">
                <font size="2" face="'rodin', Arial, Helvetica, sans-serif" color="#72767d">
                    Using an older device or console? Switch to the <a href="/draw/{$CHANNEL_ID}{$MODE_TOGGLE_URL}" style="color: #00b0f4; text-decoration: underline;">retro drawing tool</a>.
                </font>
            </div>
        </div>

        <div class="content-padding">
            <div class="message-form-container">
                {$EMOJI_PICKER}
                <form action="../senddrawing" method="post" id="sendform" onsubmit="prepareAndSend()" style="position: relative">
                    <div>
                        {$EMOJI_BUTTON}
                        <a href="/upload/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f4e4.gif" alt="Upload file" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/draw/{$CHANNEL_ID}{$MODE_TOGGLE_URL}" class="message-action-btn" title="Switch to Old 3DS / Lite Drawing Mode">
                            <img src="/resources/twemoji/1f58c-fe0f.gif" alt="3DS Mode" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/pins/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f4cc.gif" alt="Pins" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/sports{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/26bd.gif" alt="Sports" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/food/{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f355.gif" alt="Order Pizza" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/news{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f4f0.gif" alt="News" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/weather{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/26c5.gif" alt="Weather" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/stocks{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f4c8.gif" alt="Stocks" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/currency{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f4b5.gif" alt="Currency" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/tv{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f4fa.gif" alt="TV Guide" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/movies{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f3ac.gif" alt="Movies &amp; TV" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/switchtheme{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="javascript:void(0)" onclick="var f=document.getElementById('sendform'); if(f){ f.action='/signmessage/{$CHANNEL_ID}{$SESSION_PARAM}'; f.method='GET'; f.submit(); }" class="message-action-btn" title="Sign Your Message">
                            <img src="/resources/twemoji/1f310.gif" alt="Sign Your Message" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="/channels/{$CHANNEL_ID}{$SESSION_PARAM}" class="message-action-btn">
                            <img src="/resources/twemoji/2b05.gif" alt="Back" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                        <a href="javascript:void(0)" onclick="location.reload()" class="message-action-btn">
                            <img src="/resources/twemoji/1f501.gif" alt="Refresh" width="24" height="24" style="width: 24px; height: 24px;">
                        </a>
                    </div>

                    <input type="hidden" id="channel" name="channel" value="{$CHANNEL_ID}">
                    <input type="hidden" name="sessionID" value="{$SESSION_ID}">
                    <input type="hidden" id="drawinginput" name="drawinginput" value="">
                    <input type="hidden" id="lite" name="lite" value="False">

                    <div class="message-input-bar-wrapper">
                        <table>
                            <tr>
                                <td style="width: 100%; padding: 0;">
                                    <textarea name="message" id="message" class="message-input-field" placeholder="Message {$CHANNEL_NAME}" onkeydown="return handleMessageKeydown(event);" oninput="autoResize(this)" rows="1" style="box-sizing: border-box; width: 100%; color: #dcddde; background: transparent; border: none; outline: none; height: 44px; padding: 11px 16px; font-family: 'rodin', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 16px; line-height: 20px;"></textarea>
                                </td>
                                <td style="padding: 0 4px 0 0;">
                                    <input type="submit" class="send-button-input" value="Send" style="background: #5865f2; border: none; border-radius: 4px; color: white; padding: 0 16px; cursor: pointer; font-family: 'rodin', Whitney, 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; height: 44px; white-space: nowrap; margin-right: 8px; display: block; width: 82px;">
                                </td>
                            </tr>
                        </table>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!--
      Drive the Wii tool with the shared, proven draw.js engine. draw.js detects the
      Wii user-agent and uses immediate moveTo/lineTo strokes while skipping the
      getImageData-based undo history that freezes Wii Opera. draw.ts inlines this
      script (replacing the src) so it runs AFTER the DOM is parsed — an external
      <script src> on Wii Opera 9 can execute before the canvas/toolbar exist.
    -->
    <script src="/js/draw.js"></script>
</body>
</html>
