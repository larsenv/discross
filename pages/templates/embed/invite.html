<div class="embed">
  <div class="embed-color-bar" style="background-color: #2f3136;">&nbsp;</div>
  <div class="embed-content" style="padding: 12px;">
    <div style="font-size: 0.8em; font-weight: bold; color: #b9bbbe; text-transform: uppercase; margin-bottom: 8px;">You've been invited to join a server</div>
    <div style="display: table; width: 100%;">
      <div style="display: table-cell; width: 50px; vertical-align: top;">
        {$INVITE_ICON}
      </div>
      <div style="display: table-cell; vertical-align: middle; padding-left: 10px;">
        <div style="font-weight: bold; font-size: 1.1em; color: #ffffff;">{$GUILD_NAME}</div>
        <div style="font-size: 0.85em; color: #b9bbbe;">
          <span style="color: #43b581;">●</span> {$ONLINE_COUNT} Online
          &nbsp;&nbsp;
          <span style="color: #747f8d;">●</span> {$MEMBER_COUNT} Members
        </div>
      </div>
      <div style="display: table-cell; vertical-align: middle; text-align: right; width: 80px;">
        <a href="{$INVITE_URL}" target="_blank" style="display: inline-block; background-color: #43b581; color: white; padding: 6px 16px; border-radius: 3px; text-decoration: none; font-size: 0.9em; font-weight: 500;">Join</a>
      </div>
    </div>
  </div>
</div>
