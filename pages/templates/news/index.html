<!doctype html>
<html lang="en" class="page-news">
  <head>
    {$COMMON_HEAD}
    
  </head>

  <body style="margin: 0" {$WHITE_THEME_ENABLED}>
    <div id="wrapper">
      <table style="width: 100%">
        <tr valign="middle">
          <td>
            <a href="/server/"><img src="/resources/logo.gif" alt="Logo" /></a>
          </td>
          <td>
            <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
          </td>
          <td width="100%" align="right">
            <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">{$MENU_OPTIONS}</font>
          </td>
          <td valign="middle" style="padding-right: 8px;">
            <a href="/switchtheme"><img src="/resources/twemoji/1f313.gif" alt="Switch theme" width="36" height="36" style="background: none; border: none" /></a>
          </td>
        </tr>
      </table>
      <hr style="margin: 0" />
      <div style="padding: 16px">
        <b><font size="5" face="'rodin', Arial, Helvetica, sans-serif">AP News - {$TAG_DISPLAY}</font></b><br />
        <form method="get" action="/news" class="news-search-form">
          {$SESSION_HIDDEN}
          <input type="text" name="tag" placeholder="Category tag (e.g. sports)" value="{$TAG_VALUE}" class="news-search-input" />
          <input type="submit" value="Go" class="discross-button news-search-btn" />
        </form>
        <div id="news-feed">{$NEWS_ITEMS}</div>
        <p class="news-attribution">
          News content is provided by
          <a href="http://apnews.com/" target="_blank" rel="noopener noreferrer">Associated Press</a>
        </p>
      </div>
    </div>
  </body>
</html>
