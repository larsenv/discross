<!DOCTYPE html>
<html>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#2b5797">
  <meta name="theme-color" content="#ffffff">
  <style>
    html,
    body,
    #wrapper {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'rodin', Arial, Helvetica, sans-serif;
    }

    .light-theme #wrapper {
      background: #FFFFFF !important;
      color: #000000 !important;
    }

    .light-theme #wrapper * {
      background: #FFFFFF !important;
      color: #000000 !important;
    }

    /* Exception for purple buttons in light theme */
    .light-theme #wrapper input[type="submit"] {
      background: #5865f2 !important;
      color: #ffffff !important;
    }

    .light-theme #wrapper table div {
      background: #ebedef !important;
    }

    .light-theme #wrapper input[type="text"],
    .light-theme #wrapper input[type="password"] {
      background: #ebedef !important;
      color: #060607 !important;
      border: none !important;
    }

    /* AMOLED theme overrides for register page */
    .amoled-theme {
      background: #000000 !important;
    }

    .amoled-theme #wrapper {
      background: #000000 !important;
      color: #ffffff !important;
    }

    .amoled-theme #wrapper * {
      background: #000000 !important;
      color: #ffffff !important;
    }

    .amoled-theme #wrapper table div {
      background: #111111 !important;
    }

    .amoled-theme #wrapper input[type="text"],
    .amoled-theme #wrapper input[type="password"] {
      background: #111111 !important;
      color: #ffffff !important;
      border: none !important;
    }

    .amoled-theme a {
      color: #5865f2 !important;
    }

    /* Exception for purple buttons in AMOLED theme */
    .amoled-theme #wrapper input[type="submit"] {
      background: #5865f2 !important;
      color: #ffffff !important;
    }

    @font-face {
      font-family: 'rodin';
      src: url('https://mariocube.com/css/RodinNTLGPro-DB-AlphaNum.woff2') format('woff2'),
           url('https://mariocube.com/css/RodinNTLGPro-DB-AlphaNum.woff') format('woff');
      font-weight: 400;
    }

    @font-face {
      font-family: 'rodin';
      src: url('https://mariocube.com/css/RodinNTLGPro-B-AlphaNum.woff2') format('woff2'),
           url('https://mariocube.com/css/RodinNTLGPro-B-AlphaNum.woff') format('woff');
      font-weight: 700;
    }
  </style>
</head>

<body style="margin: 0;" {$WHITE_THEME_ENABLED}>
  <div id="wrapper">
    <table style="width: 100%;">
      <tr valign="middle">
        <td><a href="/"><img src="/resources/logo.gif" alt="Logo"></a></td>
        <td>
          <font size="7" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">discross</font>
        </td>
        <td width="100%" align="right">
          <font size="4" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">&#160;&#160; {$MENU_OPTIONS}</font>
        </td>
        <td valign="middle">
          <form action="/switchtheme" method="post">
            <input type="image" src="/resources/images/themeswitch.gif" alt="Switch theme" style="background: none; border: none;">
          </form>
        </td>
      </tr>
    </table>
    <hr style="margin: 0;">
    <br>
    <table>
        <tr>
          <td>
            &nbsp;&nbsp;&nbsp;&nbsp;
          </td>
          <td>
            <form action="/register" method="post">
              <font size="6" face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">Register</font><br><br>
              <font face="'rodin', Arial, Helvetica, sans-serif" color="#dddddd">
                Username:
                <br><br>
                <div style="padding: 16px;background: #393c40;width: 300px;"><input
                  type="text" name="username" id="username" value=""
                  style="color: #dddddd;background: #393c40;border: none;width: 100%;outline: none;"
                  placeholder="Username"></div>
                <br>
                Password:<br><br>(don't use your Discord password)
                <br><br>
                <div style="padding: 16px;background: #393c40;width: 300px;"><input
                    type="password" name="password" id="password" value=""
                    style="color: #dddddd;background: #393c40;border: none;width: 100%;outline: none;"
                    placeholder="Password"></div>
                <br>
                Confirm password:
                <br><br>
                <div style="padding: 16px;background: #393c40;width: 300px;"><input
                    type="password" name="confirm" id="confirm" value=""
                    style="color: #dddddd;background: #393c40;border: none;width: 100%;outline: none;"
                    placeholder="Confirm password"></div>
                <br>
                Verification code:
                <br><br>
                Type ^connect on a server with Discross to get this.
                <br><br>
                <div style="padding: 16px;background: #393c40;width: 300px;"><input
                    type="text" name="token" id="token" value=""
                    style="color: #dddddd;background: #393c40;border: none;width: 100%;outline: none;"
                    placeholder="Verification code"></div>
                {$ERROR}<br>
                <input type="submit"
                  style="color: #ffffff;height: 44px;width:150px;border: none;background: #5865f2;"
                  value="Register">
              </font>
            </form>
          </td>
        </tr>
    </table>
  </div>
</body>

</html>
